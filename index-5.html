// ─── LOOKUP ───────────────────────────────────────────────────────────────────
function lookupBuilding(name){
  if(!name||name.length<3)return null;
  const k=name.toLowerCase().trim();
  if(DB[k])return DB[k];
  const found=Object.entries(DB).find(([key])=>k.includes(key)||key.includes(k));
  return found?found[1]:null;
}

// ─── VALUATION ENGINE ─────────────────────────────────────────────────────────
function computeValuation(f,buildingVal,liveData){
  const bData=lookupBuilding(buildingVal);
  const aData=AREAS[f.area]||{psf:1800,sc:15,y:[5,7],g:[10,18,28]};
  const askPSF=f.size&&f.price?Math.round(f.price/f.size):0;
  if(!askPSF)return null;
  let basePSF,psfLo,psfHi,dataSource,dataLayer;
  if(bData){basePSF=bData.p;psfLo=bData.lo;psfHi=bData.hi;dataSource=buildingVal+" · Verified DB";dataLayer=1;}
  else{
    const sales=liveData&&liveData.sales?liveData.sales:[];
    const bedsMap={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5+ BR":5};
    const targetBeds=bedsMap[f.beds]!=null?bedsMap[f.beds]:2;
    const pool=sales.filter(function(s){return s.psf>400&&s.psf<15000&&Math.abs((parseInt(s.beds)||0)-targetBeds)<=1});
    const allPool=sales.filter(function(s){return s.psf>400&&s.psf<15000});
    const usePool=pool.length>=3?pool:allPool;
    if(usePool.length>=3){
      const psfs=usePool.map(function(s){return s.psf}).sort(function(a,b){return a-b});
      const trim=Math.max(0,Math.floor(psfs.length*0.1));
      const trimmed=psfs.slice(trim,psfs.length-trim);
      basePSF=Math.round(trimmed.reduce(function(s,p){return s+p},0)/trimmed.length);
      psfLo=psfs[Math.floor(psfs.length*0.2)]||Math.round(basePSF*0.90);
      psfHi=psfs[Math.floor(psfs.length*0.8)]||Math.round(basePSF*1.10);
      dataSource=usePool.length+" live comps · "+f.area;dataLayer=2;
    }else if(usePool.length>=1){
      const compAvg=Math.round(usePool.reduce(function(s,c){return s+c.psf},0)/usePool.length);
      basePSF=Math.round((compAvg+aData.psf)/2);
      psfLo=Math.round(basePSF*0.89);psfHi=Math.round(basePSF*1.11);
      dataSource=usePool.length+" comps + area avg · "+f.area;dataLayer=3;
    }else{
      basePSF=aData.psf;psfLo=Math.round(basePSF*0.87);psfHi=Math.round(basePSF*1.13);
      dataSource="Area benchmark · "+f.area;dataLayer=4;
    }
  }
  const vP=VIEW_P[f.view]||0;
  const floorN=parseInt(f.floor)||20;
  const fP=floorN>10?(floorN-10)*0.005:0;
  const furnP=f.furnished==="Furnished"?0.15:f.furnished==="Semi-Furnished"?0.07:0;
  const geoAdj=-0.06;
  const hedonicMult=(1+vP)*(1+fP)*(1+furnP)*(1+geoAdj);
  const adjPSF=Math.round(basePSF*hedonicMult);
  psfLo=Math.round(psfLo*hedonicMult);psfHi=Math.round(psfHi*hedonicMult);
  const parkBonus=Math.max(0,(parseInt(f.parking)||1)-1)*80000;
  const fairPrice=Math.round(adjPSF*f.size+parkBonus);
  const distressPrice=Math.round(psfLo*0.91*f.size);
  const goodPrice=Math.round(psfLo*f.size);
  const overpricedAt=Math.round(psfHi*1.06*f.size);
  const vsPct=((askPSF-adjPSF)/adjPSF)*100;
  let verdict,suggestedOffer;
  if(askPSF<=psfLo*0.91){verdict="DISTRESS";suggestedOffer=null;}
  else if(askPSF<=psfLo){verdict="GOOD";suggestedOffer=null;}
  else if(askPSF<=psfHi){verdict="FAIR";suggestedOffer=Math.round(fairPrice*0.97);}
  else{verdict="OVER";suggestedOffer=fairPrice;}
  const baseConf=[0,95,85,72,58][dataLayer]||58;
  const compsBonus=(liveData&&liveData.txs&&liveData.txs.length>=5)?5:(liveData&&liveData.txs&&liveData.txs.length>=2)?2:0;
  const inputPenalty=(!f.floor?-4:0)+(f.view==="Not specified"?-2:0)+(!f.serviceCharge?-1:0);
  const confScore=Math.min(97,Math.max(40,baseConf+compsBonus+inputPenalty));
  const confTier=confScore>=90?{label:"Very High",range:"±3–5%",spread:0.04,c:"green"}:confScore>=80?{label:"High",range:"±5–8%",spread:0.07,c:"green"}:confScore>=68?{label:"Medium",range:"±8–12%",spread:0.11,c:"yellow"}:confScore>=55?{label:"Low",range:"±12–18%",spread:0.15,c:"yellow"}:{label:"Indicative",range:"±18–25%",spread:0.22,c:"red"};
  const priceLow=Math.round(fairPrice*(1-confTier.spread));
  const priceHigh=Math.round(fairPrice*(1+confTier.spread));
  const bn={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5+ BR":5}[f.beds]!=null?{"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5+ BR":5}[f.beds]:2;
  const isV=f.type==="Villa"||f.type==="Townhouse";
  const rent=isV?(bn<=3?aData.rv3||180000:aData.rv4||240000):bn===0?(aData.r1||65000)*0.65:bn===1?aData.r1||65000:bn===2?aData.r2||100000:bn===3?aData.r3||150000:(aData.r3||150000)*1.4;
  const sc=(parseFloat(f.serviceCharge)||(bData&&bData.sc)||aData.sc||15)*f.size;
  const grossYield=(rent/f.price*100).toFixed(1);
  const netYield=((rent-sc)/f.price*100).toFixed(1);
  const gr=aData.g||[10,18,28];
  return{askPSF,adjPSF,psfLo,psfHi,fairPrice,distressPrice,goodPrice,overpricedAt,verdict,vsPct:vsPct.toFixed(1),suggestedOffer,dataSource,dataLayer,confScore,confTier,priceLow,priceHigh,inDB:!!bData,bData,vP:Math.round(vP*100),fP:Math.round(fP*100),furnP:Math.round(furnP*100),geo:6,rent,sc,grossYield,netYield,g0:gr[0],g1:gr[1],g2:gr[2],compsCount:(liveData&&liveData.sales&&liveData.sales.length)||0,txCount:(liveData&&liveData.txs&&liveData.txs.length)||0};
}

const PF_HOST="propertyfinder-uae-data.p.rapidapi.com";

async function fetchLiveData(building,area,beds){
  const bedsMap={"Studio":"0","1 BR":"1","2 BR":"2","3 BR":"3","4 BR":"4","5+ BR":"5"};
  const q=(building&&building.length>2)?building+" "+area:area;
  const bn=bedsMap[beds]||"2";
  const pfH={"x-rapidapi-key":PF_KEY,"x-rapidapi-host":PF_HOST};
  const [s,t]=await Promise.allSettled([
    fetch("https://"+PF_HOST+"/search-buy?page=1&hitsPerPage=10&q="+encodeURIComponent(q)+"&rooms="+bn,{headers:pfH}).then(function(r){return r.ok?r.json():null}),
    fetch("https://"+PF_HOST+"/get-get-transactions?page=1&size=12&q="+encodeURIComponent(q),{headers:pfH}).then(function(r){return r.ok?r.json():null}),
  ]);
  const sales=s.status==="fulfilled"&&s.value&&s.value.data&&s.value.data.properties?s.value.data.properties.filter(function(p){return p.price&&p.area}).map(function(p){return{price:p.price,size:p.area,psf:Math.round(p.price/p.area),beds:p.rooms}}):[]; 
  const txs=t.status==="fulfilled"&&t.value&&t.value.data&&t.value.data.transactions?t.value.data.transactions.filter(function(tx){return tx.price&&tx.area}).map(function(tx){return{price:tx.price,size:tx.area,psf:Math.round(tx.price/tx.area)}}):[]; 
  return{sales,txs};
}

async function askClaude(messages,system){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1000,messages:messages};
  if(system)body.system=system;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();
  return d.content&&d.content.filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("")||"";
}

function el(tag,attrs,children){
  const e=document.createElement(tag);

// ─── CHAT TAB ────────────────────────────────────────────────────────────────
function renderChat(){
  const cl=C();
  const wrap=div({display:"flex",flexDirection:"column",height:"calc(100vh - 130px)",padding:"0 20px",maxWidth:"640px",margin:"0 auto",width:"100%"});

  const msgsDiv=div({flex:"1",overflowY:"auto",display:"flex",flexDirection:"column",gap:"12px",paddingTop:"16px",paddingBottom:"12px",minHeight:"0"});
  chatState.msgs.forEach(function(m){
    const isA=m.role==="assistant";
    const row=div({display:"flex",justifyContent:isA?"flex-start":"flex-end",gap:"8px"});
    if(isA){
      row.appendChild(div({width:"28px",height:"28px",borderRadius:"7px",flexShrink:"0",background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:"900",color:"#070B14",fontFamily:"'Space Grotesk',monospace"},"DV"));
    }
    const bubble=div({maxWidth:"84%",background:isA?cl.surface:cl.goldFaint,border:"1px solid "+(isA?cl.border:cl.goldDim),borderRadius:isA?"14px 14px 14px 0":"14px 14px 0 14px",padding:"11px 15px",color:cl.subHi,fontSize:"13px",lineHeight:"1.8",fontFamily:"'Inter',sans-serif",whiteSpace:"pre-wrap"});
    bubble.textContent=m.text;
    row.appendChild(bubble);
    msgsDiv.appendChild(row);
  });
  if(chatState.loading){
    const row=div({display:"flex",gap:"8px",alignItems:"center"});
    row.appendChild(div({width:"28px",height:"28px",borderRadius:"7px",background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:"900",color:"#070B14"},"DV"));
    const dots=div({display:"flex",gap:"4px"});
    [0,1,2].forEach(function(j){dots.appendChild(div({width:"7px",height:"7px",borderRadius:"50%",background:cl.gold,animation:"bounce 1.1s "+(j*0.18)+"s infinite"}))});
    row.appendChild(dots);msgsDiv.appendChild(row);
  }
  wrap.appendChild(msgsDiv);

  // Suggestions
  if(chatState.msgs.length<=1){
    const suggs=div({display:"flex",flexDirection:"column",gap:"7px",marginBottom:"10px"});
    ["Is BLVD Heights at AED 2,800 PSF a good deal?","Best yield under AED 1.5M right now?","Off-plan vs ready in 2026?","Geo risk still affecting prices?"].forEach(function(s){
      const b=el("button",{style:{background:cl.surface,border:"1px solid "+cl.border,color:cl.sub,padding:"9px 14px",borderRadius:"10px",cursor:"pointer",fontSize:"12.5px",fontFamily:"'Inter',sans-serif",textAlign:"left"},onclick:function(){sendChat(s);}},s);
      suggs.appendChild(b);
    });
    wrap.appendChild(suggs);
  }

  // Input
  const inputRow=div({display:"flex",gap:"10px",alignItems:"center",background:cl.surface,border:"1px solid "+cl.border,borderRadius:"12px",padding:"10px 14px",marginBottom:"14px"});
  const chatInp=el("input",{style:{flex:"1",background:"transparent",border:"none",outline:"none",color:cl.white,fontSize:"13px",fontFamily:"'Inter',sans-serif",caretColor:cl.gold},placeholder:"Ask about any building, deal, or market question…"});
  chatInp.value=chatState.input;
  chatInp.addEventListener("input",function(){chatState.input=chatInp.value});
  chatInp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});
  const sendBtn=el("button",{style:{background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",color:"#070B14",border:"none",width:"36px",height:"36px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"800"},onclick:function(){sendChat();}},"\u2192");
  inputRow.appendChild(chatInp);inputRow.appendChild(sendBtn);
  wrap.appendChild(inputRow);

  setTimeout(function(){msgsDiv.scrollTop=msgsDiv.scrollHeight},50);
  return wrap;
}

async function sendChat(text){
  const t=text||chatState.input.trim();
  if(!t||chatState.loading)return;
  chatState.input="";
  chatState.msgs.push({role:"user",text:t});
  chatState.loading=true;render();
  try{
    const history=chatState.msgs.slice(-8).map(function(m){return{role:m.role==="assistant"?"assistant":"user",content:m.text}});
    const CHAT_SYS="You are DubaiVal AI — Dubai's most precise property intelligence engine. June 2026.\nMarket: Post-geo correction, -6% adj, moderation phase, buyer leverage window.\nPSF: Downtown 2,400 | Marina 2,000 | Palm 3,300 | Business Bay 1,900 | JVC 1,150 | Dubai Hills 1,850.\nYields: JVC 7.5-9.5% | Al Furjan 7-8.5% | Business Bay 5.8-6.5% | Downtown 4.8-5.5%.\nBe specific with AED. Short and decisive.";
    const reply=await askClaude(history,CHAT_SYS);
    chatState.msgs.push({role:"assistant",text:reply});
  }catch(e){chatState.msgs.push({role:"assistant",text:"Error: "+e.message});}
  chatState.loading=false;render();
}
