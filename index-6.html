// --- LOOKUP -------------------------------------------------------------------
function lookupBuilding(name,areaHint){
  const filterByArea=function(results){
    if(!areaHint||!results||results.length===0)return results;
    const areaFiltered=results.filter(function(e){return !e[1].a||e[1].a===areaHint;});
    return areaFiltered.length>0?areaFiltered:results;
  };
  if(!name||name.length<3)return null;
  const k=name.toLowerCase().trim();
  // 1. Exact match
  if(DB[k])return DB[k];
  // 2. Alias map (handles "Tower 1" vs "T1" and other variants)
  if(ALIASES[k]&&DB[ALIASES[k]])return DB[ALIASES[k]];
  // 3. Normalize: replace "tower N" with "tN" and retry
  const norm=k.replace(/\btower\s+([0-9]+)/g,"t$1").replace(/\btower\s+([a-c])\b/g,"$1");
  if(DB[norm])return DB[norm];
  if(ALIASES[norm]&&DB[ALIASES[norm]])return DB[ALIASES[norm]];
  // 4. Prefix match — only if k is specific enough (>8 chars) to avoid wrong tower matches
  if(k.length>8){
    const prefix=Object.entries(DB).find(function(e){return e[0].startsWith(k)||k.startsWith(e[0])});
    if(prefix)return prefix[1];
  }
  // 5. Contains match — but skip if result is a base entry when tower-specific exists
  const allContains=Object.entries(DB).filter(function(e){return k.includes(e[0])||e[0].includes(k);});
  if(allContains.length>0){
    // Prefer area match
    const areaMatch=allContains.filter(function(e){return !areaHint||e[1].a===areaHint;});
    const pool=areaMatch.length>0?areaMatch:allContains;
    // Prefer exact length match or longest key match
    const best=pool.sort(function(a,b){
      const aExact=a[0]===k?1:0;
      const bExact=b[0]===k?1:0;
      return bExact-aExact||b[0].length-a[0].length;
    })[0];
    return best[1];
  }
  // 6. Word match
  const words=k.split(" ").filter(function(w){return w.length>2;});
  if(words.length>=2){
    const wordMatch=Object.entries(DB).find(function(e){return words.every(function(w){return e[0].includes(w);});});
    if(wordMatch)return wordMatch[1];
  }
  return null;
}

// --- VALUATION ENGINE ---------------------------------------------------------
function computeValuation(f,buildingVal,liveData){
  const bData=lookupBuilding(buildingVal||f.building||"",f.area);
  const aData=AREAS[f.area]||{psf:1800,sc:15,y:[5,7],g:[10,18,28]};
  const size=parseFloat((f.buaSize||f.size||"").toString().replace(/,/g,""))||0;
  const price=parseFloat((f.price||"").toString().replace(/,/g,""))||0;
  const askPSF=size>0&&price>0?Math.round(price/size):0;
  if(!askPSF||!f.area)return null;
  let basePSF,psfLo,psfHi,dataSource,dataLayer;
  if(bData){basePSF=bData.p;psfLo=bData.lo;psfHi=bData.hi;dataSource=(buildingVal||f.building||"")+" · Verified DB";dataLayer=1;}
  else{
    const sales=liveData&&liveData.sales?liveData.sales:[];
    const pool=sales.filter(function(s){return s.psf>400&&s.psf<15000});
    if(pool.length>=3){
      const psfs=pool.map(function(s){return s.psf}).sort(function(a,b){return a-b});
      const pLo=psfs[Math.floor(psfs.length*0.2)];
      const pHi=psfs[Math.floor(psfs.length*0.8)];
      // Trimmed mean: average only comps within the 20th-80th percentile band,
      // so a single distressed/bulk-deal sale can't skew the base price.
      const trimmed=psfs.filter(function(p){return p>=pLo&&p<=pHi});
      const meanPool=trimmed.length?trimmed:psfs;
      basePSF=Math.round(meanPool.reduce(function(s,p){return s+p},0)/meanPool.length);
      psfLo=pLo||Math.round(basePSF*0.90);
      psfHi=pHi||Math.round(basePSF*1.10);
      dataSource=pool.length+" comps · "+f.area;dataLayer=2;
    }else{
      // No real signal of building grade exists here (an unmatched building-name
      // string is not evidence of any particular grade), so use the area's own
      // blended psf average rather than guessing a grade tier — guessing "B+"
      // by default previously caused systematic overestimation in budget areas
      // (e.g. Town Square) whenever any building name was typed but not found in DB.
      basePSF=aData.psf;psfLo=Math.round(basePSF*0.87);psfHi=Math.round(basePSF*1.13);
      dataSource="Area benchmark · "+f.area;dataLayer=4;
    }
  }
  // Premiums
  // For DB buildings: apply differential view premium vs the grade baseline,
  // but never penalize — views below baseline get 0 (no negative adjustment).
  // Rule: no punishment in pricing for any view type.
  const GRADE_BASE_VIEW={"Ultra":0.28,"A+":0.19,"A":0.12,"A-":0.06,"B+":0.03,"B":0,"C":0};
  const rawVP=VIEW_P[f.view]||0;
  let vP;
  if(bData&&bData.g&&GRADE_BASE_VIEW[bData.g]!==undefined){
    if(f.view==="Not specified"){
      vP=0; // assume average view already in DB price
    } else {
      vP=rawVP-GRADE_BASE_VIEW[bData.g];
      vP=Math.max(0,Math.min(0.15,vP));
    }
  } else {
    vP=rawVP;
  }
  const isVilla=f.propCategory==="villa";
  const floorN=parseInt(f.floor)||0;
  // Villas: always fP=0 (ground-level, no floor premium)
  // Apartments in DB: differential vs baseline floor 15
  // Apartments not in DB: standard +0.5% per floor above 10
  let fP=0;
  if(!isVilla){
    if(bData&&floorN>0){
      const diffFloors=floorN-15;
      fP=Math.max(-0.07,Math.min(0.15,diffFloors*0.005));
    } else if(!bData&&floorN>10){
      fP=(floorN-10)*0.005;
    }
    // If floor not entered for DB building, fP=0 (assume baseline)
  }
  // Loft premium (double height ceiling)
  const loftP=f.aptSubtype==="Loft"?0.08:0;
  // Penthouse premium
  const penthP=f.aptSubtype==="Penthouse"?0.15:0;
  // Maid's room premium
  const maidP=f.hasMaid?0.03:0;
  const privatePoolP=isVilla&&f.privatePool?0.12:0;  // 12% - private pool premium (Dubai market)
  const singleRowP=isVilla&&f.singleRow?0.08:0;    // 8% - single row / end-unit privacy
  const cornerVillaP=isVilla&&f.cornerVilla?0.05:0; // 5% - corner plot premium
  // Developer-furnished buildings (df:1): base PSF already includes furniture premium
  // Selecting "Furnished" = no extra premium (already in price); "Unfurnished" = discount
  const isDevFurnished=!!(bData&&bData.df);
  let furnP;
  if(isDevFurnished){
    furnP=f.furnished==="Unfurnished"?-0.10:f.furnished==="Semi-Furnished"?-0.05:0;
  }else{
    furnP=f.furnished==="Furnished"?0.15:f.furnished==="Semi-Furnished"?0.07:0;
  }
  const geoAdj=-0.06; // Regional discount Jun 2026 — reflected in prime area market data
  const hedonicMult=(1+vP)*(1+fP)*(1+loftP)*(1+penthP)*(1+maidP)*(1+furnP)*(1+privatePoolP)*(1+singleRowP)*(1+cornerVillaP)*(1+geoAdj);
  const adjPSF=Math.round(basePSF*hedonicMult);
  psfLo=Math.round(psfLo*hedonicMult);psfHi=Math.round(psfHi*hedonicMult);
  const parkBonus=Math.max(0,(parseInt(f.parking)||1)-1)*80000;
  const fairPrice=Math.round(adjPSF*size+parkBonus);
  // Area-sensitive price ladder (based on DLD distress data March 2026)
  var areaSens=(["Palm Jumeirah","Dubai Marina","Downtown Dubai","DIFC","Dubai Harbour","Emaar Beachfront","Jumeirah Beach Residence","City Walk"].indexOf(f.area)>=0)?"high":(["Business Bay","Dubai Creek Harbour","MBR City","Sobha Hartland","Dubai Hills Estate","Jumeirah Lake Towers"].indexOf(f.area)>=0)?"med":"low";
  // Distress floor: how low can motivated sellers go?
  var distressFloor=areaSens==="high"?0.78:areaSens==="med"?0.82:0.85;
  var goodFloor=areaSens==="high"?0.90:areaSens==="med"?0.92:0.93;
  var overCeil=areaSens==="high"?1.10:areaSens==="med"?1.12:1.14;
  distressPrice=Math.round(adjPSF*distressFloor*size);
  const goodPrice=Math.round(adjPSF*goodFloor*size);
  const overpricedAt=Math.round(adjPSF*overCeil*size);
  const vsPct=((askPSF-adjPSF)/adjPSF)*100;
  let verdict,suggestedOffer;
  if(askPSF<=adjPSF*(distressFloor+0.05)){verdict="DISTRESS";suggestedOffer=null;}
  else if(askPSF<=adjPSF*(goodFloor+0.04)){verdict="GOOD";suggestedOffer=null;}
  else if(askPSF<=adjPSF*1.07){verdict="FAIR";suggestedOffer=Math.round(fairPrice*0.97);}
  else{verdict="OVER";suggestedOffer=fairPrice;}
  const baseConf=[0,95,85,72,58][dataLayer]||58;
  const inputPenalty=(!f.floor&&!isVilla?-4:0)+(f.view==="Not specified"?-2:0)+(!f.serviceCharge?-1:0);
  // FSD-style spread adjustment (CoreLogic Forecast Standard Deviation logic):
  // tighter lo-hi PSF range relative to price = more confident estimate
  const relSpread=adjPSF>0?(psfHi-psfLo)/adjPSF:0.25;
  const spreadAdj=relSpread<=0.15?5:relSpread<=0.25?0:relSpread<=0.40?-5:-10;
  const confScore=Math.min(97,Math.max(40,baseConf+inputPenalty+spreadAdj));
  const confTier=confScore>=90?{label:"Very High",range:"±3–5%",spread:0.04,c:"green"}:confScore>=80?{label:"High",range:"±5–8%",spread:0.07,c:"green"}:confScore>=68?{label:"Medium",range:"±8–12%",spread:0.11,c:"yellow"}:confScore>=55?{label:"Low",range:"±12–18%",spread:0.15,c:"yellow"}:{label:"Indicative",range:"±18–25%",spread:0.22,c:"red"};
  const priceLow=Math.round(fairPrice*(1-confTier.spread));
  const priceHigh=Math.round(fairPrice*(1+confTier.spread));
  const bnMap={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5 BR":5,"5+ BR":5,"6 BR":6,"7 BR":7,"7+ BR":7};
  const bn=bnMap[f.beds]!=null?bnMap[f.beds]:2;
  const rent=isVilla?(bn<=3?aData.rv3||180000:bn<=4?aData.rv4||240000:bn<=5?aData.rv5||350000:bn<=6?aData.rv6||500000:aData.rv7||650000):bn===0?(aData.r1||65000)*0.65:bn===1?aData.r1||65000:bn===2?aData.r2||100000:bn===3?aData.r3||150000:(aData.r3||150000)*1.4;
  const sc=(parseFloat(f.serviceCharge)||(bData&&bData.sc)||aData.sc||15)*size;
  const grossYield=(rent/price*100).toFixed(1);
  const netYield=((rent-sc)/price*100).toFixed(1);
  const gr=aData.g||[10,18,28];
  // Price-to-Rent ratio bubble signal (NY Fed SR-218 / NBER WP-11643 / UBS GREBI thresholds)
  const grossYieldNum=parseFloat(grossYield);
  const prRatio=grossYieldNum>0?100/grossYieldNum:null;
  const investSignal=prRatio===null?null:prRatio<15?{label:"Undervalued",c:"green"}:prRatio<20?{label:"Fair Value",c:"green"}:prRatio<25?{label:"Elevated",c:"yellow"}:{label:"Bubble Risk",c:"red"};
  // Total annualized return = Net Yield + base-case capital growth annualized over the 3-year forecast horizon
  const totalReturnAnnual=(parseFloat(netYield)+gr[1]/3).toFixed(1);
  return{askPSF,adjPSF,psfLo,psfHi,fairPrice,distressPrice,goodPrice,overpricedAt,verdict,vsPct:vsPct.toFixed(1),suggestedOffer,dataSource,dataLayer,confScore,confTier,priceLow,priceHigh,inDB:!!bData,bData,isDevFurnished,vP:Math.round(vP*100),fP:Math.round(fP*100),furnP:Math.round(furnP*100),loftP:Math.round(loftP*100),penthP:Math.round(penthP*100),maidP:Math.round(maidP*100),privatePoolP:Math.round(privatePoolP*100),singleRowP:Math.round(singleRowP*100),cornerVillaP:Math.round(cornerVillaP*100),geo:Math.round(geoAdj*100),rent,sc,grossYield,netYield,g0:gr[0],g1:gr[1],g2:gr[2],prRatio:prRatio?prRatio.toFixed(1):null,investSignal,totalReturnAnnual};
}

async function fetchLiveData(building,area,beds){

    if(!locId)return{sales:[],txs:[]};

    const params=new URLSearchParams({locationExternalIDs:locId,purpose:"for-sale",hitsPerPage:"15",page:"0",rooms_min:String(bn),rooms_max:String(bn)});
    const [sp,tp]=await Promise.allSettled([
      fetch("https://"+UAE_RE_HOST+"/properties/list?"+params,{headers:h}).then(function(r){return r.ok?r.json():null}),

    ]);
    const sales=sp.status==="fulfilled"&&sp.value&&sp.value.hits?sp.value.hits.filter(function(p){return p.price&&p.area}).map(function(p){return{price:p.price,size:p.area,psf:Math.round(p.price/p.area),beds:p.rooms}}).filter(function(p){return p.psf>400&&p.psf<15000}):[];
    const txs=tp.status==="fulfilled"&&tp.value&&tp.value.hits?tp.value.hits.filter(function(t){return t.price&&t.area}).map(function(t){return{price:t.price,size:t.area,psf:Math.round(t.price/t.area)}}).filter(function(t){return t.psf>400&&t.psf<15000}):[];
    return{sales,txs};
  }catch(e){return{sales:[],txs:[]};}
}

async function askAI(messages,system){
  const groqMessages=[];
  if(system)groqMessages.push({role:"system",content:system});
  messages.forEach(function(m){groqMessages.push({role:m.role,content:m.content})});
  const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY+""},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:1000,messages:groqMessages})

  if(!r.ok)throw new Error("API "+r.status);
  const d=await r.json();
  return d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||"";
}

  async function doSearch(){
    var query=FS.query||"";
    var area=FS.area||"";
    var beds=FS.beds||"";
    var maxPrice=parseInt(FS.maxPrice)||0;
    var type=FS.type||"Apartment";
    
    FS.loading=true;FS.results=[];FS.searched=false;FS.aiSummary="";
    render();

    try{
      // Step 1: Try uae-real-estate2 for real live listings
      var uaeH={"x-rapidapi-key":UAE_RE_KEY,"x-rapidapi-host":UAE_RE_HOST};
      var bedsNumMap={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5 BR":5,"5+ BR":5};
      var bn=bedsNumMap[beds]||2;
      var searchTerm=query||(area?area:"Dubai");
      var locId=await getUAELocationId(searchTerm);
      if(!locId&&area)locId=await getUAELocationId(area);

      if(locId){
        var params=new URLSearchParams({locationExternalIDs:locId,purpose:"for-sale",hitsPerPage:"25",page:"0"});
        if(beds){params.set("rooms_min",String(bn));params.set("rooms_max",String(bn));}
        if(maxPrice>0)params.set("priceMax",String(maxPrice));
        var listResp=await fetch("https://"+UAE_RE_HOST+"/properties/list?"+params,{headers:uaeH});
        if(listResp.ok){
          var listData=await listResp.json();
          var liveHits=listData.hits||[];
          if(liveHits.length>0){
            FS.results=liveHits.filter(function(p){return p.price&&p.area;}).map(function(p){
              var psf=p.area>0?Math.round(p.price/p.area):0;
              var locName=p.location&&p.location.length>0?p.location[p.location.length-1].name:(area||"Dubai");
              return{
                title:p.title||(p.rooms+" BR in "+locName),
                area:locName,
                price:p.price||0,
                size:p.area||0,
                psf:psf,
                beds:p.rooms||bn,
                baths:p.baths||0,
                floor:p.floor||"",
                furnished:p.furnishingStatus||"",
                permit:p.permitNumber||"",
                agentName:(p.agency&&p.agency.name)||"",
                agencyName:(p.agency&&p.agency.name)||"",
                agentPhone:"",
                agentWA:"",
                photo:(p.coverPhoto&&p.coverPhoto.url)||"",
                listingUrl:p.externalURL||"https://www.bayut.com",
                listingSource:"Bayut",
                source:"Bayut"
              };
            }).filter(function(p){return p.psf>200&&p.psf<20000;});
            if(FS.results.length>0){
              var prices=FS.results.map(function(r){return r.price;});
              FS.aiSummary="Found "+FS.results.length+" live listings"+(area?" in "+area:"")+". Prices: AED "+(Math.min.apply(null,prices)/1e6).toFixed(2)+"M – AED "+(Math.max.apply(null,prices)/1e6).toFixed(2)+"M. Source: Bayut via RapidAPI.";
            }
          }
        }
      }

      // Step 2: Groq AI fallback if no live results
      if(FS.results.length===0){
        var searchQuery=(beds?beds+" ":"")+type+" for sale"+(area?" in "+area:"")+(maxPrice?" under AED "+(maxPrice/1e6).toFixed(1)+"M":"")+". June 2026. Dubai UAE.";
        var prompt="Provide market intelligence for: "+searchQuery+"\n\nReturn EXACTLY this JSON array (5-8 typical options based on June 2026 market data):\n[{\"title\":\"Building Name Type Beds\",\"area\":\"Area Name\",\"price\":2500000,\"size\":1200,\"beds\":2,\"baths\":2,\"floor\":15,\"furnished\":\"Unfurnished\",\"permit\":\"\",\"agentName\":\"DubaiVal AI\",\"agencyName\":\"Market Estimate\",\"agentPhone\":\"\",\"agentWA\":\"\",\"photo\":\"\",\"listingUrl\":\"https://www.bayut.com\",\"source\":\"AI Estimate\"}]\n\nUse real June 2026 market prices. Return ONLY the JSON array, no other text.";
        var resp=await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY+""},
          body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:"You are a Dubai real estate market expert. Return ONLY valid JSON arrays based on June 2026 market data."},{role:"user",content:prompt}],max_tokens:2000,temperature:0.3})
        });
        var data=await resp.json();
        var text=data.choices&&data.choices[0]?data.choices[0].message.content:"";
        var clean=text.replace(/```json|```/g,"").trim();
        var arrStart=clean.indexOf("[");
        var arrEnd=clean.lastIndexOf("]")+1;
        if(arrStart>=0&&arrEnd>arrStart){
          var parsed=JSON.parse(clean.substring(arrStart,arrEnd));
          if(Array.isArray(parsed)&&parsed.length>0){
            FS.results=parsed.map(function(p){
              return{title:p.title||"Property",area:p.area||area,price:p.price||0,size:p.size||0,psf:p.size>0?Math.round(p.price/p.size):0,beds:p.beds||0,baths:p.baths||0,floor:p.floor||"",furnished:p.furnished||"",permit:p.permit||"",agentName:p.agentName||"DubaiVal AI",agencyName:p.agencyName||"Market Estimate",agentPhone:p.agentPhone||"",agentWA:p.agentWA||"",photo:p.photo||"",listingUrl:p.listingUrl||"https://www.bayut.com",listingSource:p.source||"AI Estimate",source:p.source||"AI Estimate"};
            });
            FS.aiSummary="Live API unavailable — showing AI market estimates. Prices reflect typical June 2026 values for "+searchQuery;
          }
        }
      }
    }catch(e){
      console.warn("Search failed:",e.message);
    }
    
    // If no results, fallback to DB
    if(FS.results.length===0){
      doDBSearch(query,area,beds,maxPrice,type);
      FS.aiSummary="Live search unavailable. Showing DubaiVal database results.";
    }
    
    FS.searched=true;FS.loading=false;
    render();
  }
  function doDBSearch(query,area,beds,maxPrice,type){
    var dbResults=[];
    Object.entries(DB).forEach(function(e){
      var key=e[0],val=e[1];
      if(dbResults.length>=12)return;
      var areaMatch=!area||val.a===area;
      if(areaMatch){
        var estPrice=val.p*(beds==="Studio"?500:beds==="1 BR"?750:beds==="2 BR"?1100:beds==="3 BR"?1600:2200);
        if(maxPrice&&estPrice>maxPrice)return;
        dbResults.push({title:key,area:val.a,psf:val.p,price:estPrice,g:val.g,apiSource:"DubaiVal DB"});
      }
    });
    FS.results=dbResults;
    FS.apiSource="DubaiVal DB";
  }

  return wrap;
}

// Update search suggestions without full re-render (keeps focus)
function updateSearchSuggestions(query){
  var suggestEl=document.getElementById("dv-search-suggestions");
  if(!suggestEl)return;
  if(!query||query.length<2){suggestEl.innerHTML="";return;}
  var q=query.toLowerCase().trim();
  var results=[];
  var qWords=q.split(" ").filter(function(w){return w.length>0;});
  
  // Score and search DB
  var scored=[];
  Object.entries(DB).forEach(function(e){
    var key=e[0],val=e[1];
    var key=e[0],val=e[1];
    var score=0;
    var keyWords=key.split(" ");
    if(key.startsWith(q))score=100;
    else if(q.length<=2){
      // Short query: ONLY match if KEY starts with query
      if(keyWords[0].startsWith(q))score=90;
    } else if(qWords.every(function(w){return keyWords.some(function(kw){return kw.startsWith(w);});})){
      // All query words match START of some key word
      score=keyWords[0].startsWith(qWords[0])?85:70;
    } else if(q.length>=5&&qWords.every(function(w){return key.includes(w);}))score=20;
    if(score>0)scored.push({name:key,area:val.a,psf:val.p,g:val.g,sc:val.sc,score:score});
  });
  scored.sort(function(a,b){return b.score-a.score;});
  results=scored.slice(0,8);
  
  // Search CLUSTERS
  if(results.length<8){
    Object.entries(CLUSTERS).forEach(function(e){
      var community=e[0],clusters=e[1];
      var commLower=community.toLowerCase();
      var commWords=commLower.split(" ");
      if(commLower.startsWith(q)||(q.length>2&&qWords.every(function(w){return commWords.some(function(cw){return cw.startsWith(w);});}))){
        if(!results.some(function(r){return r.name===community;}))
          results.push({name:community,area:community,psf:null,g:null,type:"community",clusters:clusters,score:50});
      }
      clusters.forEach(function(c){
        if(results.length>=8)return;
        var cl=c.toLowerCase();
        if(cl.startsWith(q)||qWords[0]&&cl.startsWith(qWords[0])){
          results.push({name:c,area:community,psf:null,g:null,type:"cluster",score:70});
        }
      });
    });
  }

  if(results.length===0){suggestEl.innerHTML="";return;}
  
  var cl=C();
  suggestEl.innerHTML="";
  suggestEl.style.cssText="background:"+cl.surface+";border:1px solid "+cl.gold+";border-radius:12px;margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.4);position:absolute;width:100%;z-index:100;";
  
  results.forEach(function(r,i){
    var item=document.createElement("button");
    item.style.cssText="width:100%;padding:12px 16px;background:transparent;border:none;border-bottom:"+(i<results.length-1?"1px solid "+cl.border:"none")+";color:#F0F2F5;font-size:13px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif;display:block;";
    var nameCap=r.name.split(" ").map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(" ");
    var typeLabel=r.type==="community"?" (Community)":r.type==="cluster"?" (Cluster)":"";
    var info=r.area+(r.psf?" · AED "+r.psf.toLocaleString()+" PSF":"")+(r.g?" · "+r.g:"")+(r.type==="community"&&r.clusters?" · "+r.clusters.length+" clusters":"");
    item.innerHTML="<div style='font-weight:600;margin-bottom:2px'>"+nameCap+typeLabel+"</div><div style='font-size:10px;color:"+cl.sub+";font-family:Space Grotesk,monospace'>"+info+"</div>";
    item.addEventListener("mouseenter",function(){this.style.background=cl.raised;});
    item.addEventListener("mouseleave",function(){this.style.background="transparent";});
    item.addEventListener("mousedown",function(e){
      e.preventDefault(); // Prevent input blur
      analyzerState.f.building=r.name;
      analyzerState.f.area=r.area||"";
      if(r.sc)analyzerState.f.serviceCharge=String(r.sc);
      if(r.type==="community"||r.type==="cluster"){
        analyzerState.f.propCategory="villa";if(!analyzerState.f.beds)analyzerState.f.beds="4 BR";
      } else {
        var n=r.name.toLowerCase();
        var isVA=typeof VILLA_AREAS!=="undefined"&&VILLA_AREAS.has(r.area);
        var isVK=typeof VILLA_KEYWORDS!=="undefined"&&VILLA_KEYWORDS.some(function(kw){return n.includes(kw);});
        analyzerState.f.propCategory=(isVA||isVK)?"villa":"apartment";
        if(analyzerState.f.propCategory==="villa"&&!analyzerState.f.beds)analyzerState.f.beds="4 BR";
      }
      suggestEl.innerHTML="";
      render();
    });
    suggestEl.appendChild(item);
  });
}

      var key=e[0],val=e[1];
      var score=0;
      var keyWords=key.split(" ");
      // Best: key starts with full query
      if(key.startsWith(q))score=100;
      // Good: every query word matches start of a key word
      else if(qWords.every(function(w){return keyWords.some(function(kw){return kw.startsWith(w);});}))score=80;
      // OK: query is start of key
      else if(key.startsWith(qWords[0]))score=60;
      // Weak: all words appear somewhere (only for long queries)
      else if(q.length>=4&&qWords.every(function(w){return key.includes(w);}))score=30;
      if(score>0)scored.push({name:key,area:val.a,psf:val.p,g:val.g,type:"building",sc:val.sc,score:score});

// --- MORTGAGE CALCULATOR ------------------------------------------------------
function renderMortgage(price, cl){
  if(!price||price<500000)return null;
  
  // State
  if(!window.MORT)window.MORT={dp:20,tenure:25,type:"fixed1",nationality:"expat"};
  const M=window.MORT;
  
  const RATES={fixed1:4.49,fixed3:4.75,variable:4.25};
  const maxLTV=M.nationality==="uae"?80:(price>=5000000?65:75);
  const minDP=100-maxLTV;
  if(M.dp<minDP)M.dp=minDP;
  
  const dpAmt=Math.round(price*M.dp/100);
  const loanAmt=price-dpAmt;
  const annualRate=(RATES[M.type])/100;
  const monthlyRate=annualRate/12;
  const n=M.tenure*12;
  const monthly=Math.round(loanAmt*(monthlyRate*Math.pow(1+monthlyRate,n))/(Math.pow(1+monthlyRate,n)-1));
  const totalPaid=monthly*n;
  const totalInterest=totalPaid-loanAmt;
  const dldFee=Math.round(price*0.04);
  const agencyFee=Math.round(price*0.02);
  const mortgageFee=Math.round(price*0.0025);
  const totalCost=dpAmt+dldFee+agencyFee+mortgageFee;

  const wrap=el("div",{style:{background:cl.surface,border:"1px solid "+cl.goldDim,borderRadius:"14px",padding:"18px",marginTop:"14px"}});
  
  // Header
  wrap.appendChild(div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"},[
    span({color:cl.gold,fontSize:"10px",letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace"},"◆ Mortgage Calculator"),
    span({color:cl.sub,fontSize:"9px",fontFamily:"'Space Grotesk',monospace"},"Dubai Rates · June 2026"),
  ]));

  // Rate type selector
  const rateRow=el("div",{style:{display:"flex",gap:"6px",marginBottom:"12px"}});
  [{k:"fixed1",l:"Fixed 1Y · 4.49%"},{k:"fixed3",l:"Fixed 3Y · 4.75%"},{k:"variable",l:"Variable · 4.25%"}].forEach(function(rt){
    const active=M.type===rt.k;
    const btn=el("button",{style:{
      flex:"1",padding:"6px 4px",borderRadius:"8px",fontSize:"9.5px",
      border:"1px solid "+(active?cl.gold:cl.border),
      background:active?cl.goldFaint:"transparent",
      color:active?cl.gold:cl.sub,
      fontFamily:"'Space Grotesk',monospace",cursor:"pointer",fontWeight:active?"700":"400",
      lineHeight:"1.3"
    },onclick:function(){M.type=rt.k;render();}},rt.l);
    rateRow.appendChild(btn);
  });
  wrap.appendChild(rateRow);

  // Down payment slider
  const dpRow=el("div",{style:{marginBottom:"12px"}});
  const dpLabel=el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}});
  dpLabel.appendChild(span({color:cl.sub,fontSize:"9px",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace"},"Down Payment"));
  dpLabel.appendChild(span({color:cl.gold,fontSize:"12px",fontWeight:"700",fontFamily:"'Space Grotesk',monospace"},M.dp+"% · AED "+dpAmt.toLocaleString()));
  dpRow.appendChild(dpLabel);
  const slider=el("input",{type:"range",min:minDP,max:50,value:M.dp,style:{width:"100%",accentColor:cl.gold}});
  slider.addEventListener("input",function(){M.dp=parseInt(this.value);render();});
  dpRow.appendChild(slider);
  const dpHint=el("div",{style:{display:"flex",justifyContent:"space-between"}});
  dpHint.appendChild(span({color:cl.sub,fontSize:"8px",fontFamily:"'Space Grotesk',monospace"},"Min "+minDP+"% (Expat)"));

  dpRow.appendChild(dpHint);
  wrap.appendChild(dpRow);

  // Tenure + Nationality row
  const optRow=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
  
  const tenureBox=el("div",{});
  tenureBox.appendChild(div({color:cl.sub,fontSize:"9px",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace",marginBottom:"4px"},"Tenure"));
  const tenureSel=el("select",{style:{width:"100%",background:cl.bg,border:"1px solid "+cl.border,color:"#F0F2F5",padding:"6px 8px",borderRadius:"6px",fontSize:"12px",fontFamily:"'Space Grotesk',monospace"}});
  [15,20,25].forEach(function(y){
    const opt=el("option",{value:y},y+" years");
    if(M.tenure===y)opt.selected=true;
    tenureSel.appendChild(opt);
  });
  tenureSel.addEventListener("change",function(){M.tenure=parseInt(this.value);render();});
  tenureBox.appendChild(tenureSel);
  optRow.appendChild(tenureBox);

  const natBox=el("div",{});
  natBox.appendChild(div({color:cl.sub,fontSize:"9px",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace",marginBottom:"4px"},"Buyer Type"));
  const natSel=el("select",{style:{width:"100%",background:cl.bg,border:"1px solid "+cl.border,color:"#F0F2F5",padding:"6px 8px",borderRadius:"6px",fontSize:"12px",fontFamily:"'Space Grotesk',monospace"}});

  wrap.appendChild(optRow);

  // Results
  const results=el("div",{style:{background:cl.raised,borderRadius:"10px",padding:"14px",marginBottom:"12px"}});
  
  // Monthly payment - big number
  const mpRow=el("div",{style:{textAlign:"center",marginBottom:"12px",paddingBottom:"12px",borderBottom:"1px solid "+cl.border}});

  mpRow.appendChild(div({color:cl.gold,fontSize:"24px",fontWeight:"800",fontFamily:"'Space Grotesk',monospace"},"AED "+monthly.toLocaleString()));
  mpRow.appendChild(div({color:cl.sub,fontSize:"10px",fontFamily:"'Space Grotesk',monospace"},M.tenure+" years · "+RATES[M.type]+"% p.a."));
  results.appendChild(mpRow);

  // Stats grid
  const statsGrid=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}});
  [
    {l:"Total Interest",v:"AED "+totalInterest.toLocaleString(),c:cl.red},
    {l:"Total Repaid",v:"AED "+totalPaid.toLocaleString(),c:"#F0F2F5"},
    {l:"DLD Fee (4%)",v:"AED "+dldFee.toLocaleString(),c:cl.sub},
    {l:"Total Upfront",v:"AED "+totalCost.toLocaleString(),c:cl.gold},
  ].forEach(function(s){
    const cell=el("div",{style:{background:"rgba(240,242,245,0.04)",borderRadius:"6px",padding:"8px"}});
    cell.appendChild(div({color:cl.sub,fontSize:"8px",letterSpacing:"0.08em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace",marginBottom:"2px"},s.l));

function computeAssetMetrics(asset){
  var aData=AREAS[asset.area]||{psf:1800,sc:15,y:[5,7],g:[10,18,28]};
  var bData=lookupBuilding(asset.building,asset.area);
  var basePSF=bData?bData.p:aData.psf;
  var vP=VIEW_P[asset.view]||0;
  var floorN=parseInt(asset.floor)||20;
  var fP=floorN>10?(floorN-10)*0.005:0;
  var furnP=asset.furnished==="Furnished"?0.15:asset.furnished==="Semi-Furnished"?0.07:0;
  var isV=asset.type==="Villa"||asset.type==="Townhouse";
  var geoAdj=getAreaGeoAdj(asset.area);
  var typeAdj=isV?MACRO_VARS.villaAdj:MACRO_VARS.aptAdj;
  var hedonicMult=(1+vP)*(1+fP)*(1+furnP)*(1+geoAdj+typeAdj);
  var adjPSF=Math.round(basePSF*hedonicMult);
  var size=parseInt(asset.size)||0;
  var currentValue=adjPSF*size;
  var purchasePrice=parseInt(asset.purchasePrice)||0;
  var roi=purchasePrice>0?((currentValue-purchasePrice)/purchasePrice*100):0;
  var bn={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5 BR":5,"5+ BR":5}[asset.beds]!=null?{"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5 BR":5,"5+ BR":5}[asset.beds]:2;
  var rent=isV?(bn<=3?aData.rv3||180000:aData.rv4||240000):bn===0?(aData.r1||65000)*0.65:bn===1?aData.r1||65000:bn===2?aData.r2||100000:bn===3?aData.r3||150000:(aData.r3||150000)*1.4;
  var sc=(parseFloat(asset.serviceCharge)||(bData&&bData.sc)||aData.sc||15)*size;
  var grossYield=currentValue>0?(rent/currentValue*100):0;
  var netYield=currentValue>0?((rent-sc)/currentValue*100):0;
  var gr=aData.g||[10,18,28];
  var purchaseDate=new Date(asset.purchaseDate);
  var now=new Date();
  var holdingMonths=Math.max(1,Math.round((now-purchaseDate)/(30.44*24*60*60*1000)));
  var holdingYears=holdingMonths/12;
  var annualizedROI=holdingYears>0&&purchasePrice>0?(Math.pow(currentValue/purchasePrice,1/holdingYears)-1)*100:roi;
  var prRatio=grossYield>0?(100/grossYield):20;
  var investSignal=prRatio<15?"Undervalued":prRatio<20?"Fair Value":prRatio<25?"Elevated":"Overheated";
  var totalReturn=netYield+(gr[1]||18)/3;
  return{currentPSF:adjPSF,currentValue:currentValue,purchasePrice:purchasePrice,roi:roi,rent:rent,sc:sc,grossYield:grossYield,netYield:netYield,holdingMonths:holdingMonths,annualizedROI:annualizedROI,g0:gr[0],g1:gr[1],g2:gr[2],inDB:!!bData,grade:bData?bData.g:"N/A",areaYield:aData.y||[5,7],investSignal:investSignal,totalReturn:totalReturn};
}

    // Building name

    var isVilla=n.type==="Villa"||n.type==="Townhouse";
    var aptViews=["Burj Khalifa View","Partial Burj View","Full Sea View","Partial Sea View","Full Canal View","Partial Canal View","Pool View","Garden/Park View","City Skyline","Road View","Not specified"];

    var fg1=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"});
    var areaW=div({});areaW.appendChild(lbl("Area *"));areaW.appendChild(mkSelect(S(),[""].concat(AREA_NAMES),n.area,function(v){n.area=v;}));fg1.appendChild(areaW);
    var typeW=div({});typeW.appendChild(lbl("Type"));typeW.appendChild(mkSelect(S(),["Apartment","Villa","Townhouse","Penthouse"],n.type,function(v){n.type=v;if((v==="Villa"||v==="Townhouse")&&aptViews.indexOf(n.view)>=0&&villaViews.indexOf(n.view)<0)n.view="Not specified";render();}));fg1.appendChild(typeW);
    var bedsW=div({});bedsW.appendChild(lbl("Bedrooms"));bedsW.appendChild(mkSelect(S(),["Studio","1 BR","2 BR","3 BR","4 BR","5 BR","5+ BR"],n.beds,function(v){n.beds=v;}));fg1.appendChild(bedsW);
    var floorW=div({});floorW.appendChild(lbl("Floor"));floorW.appendChild(inp(I(),"Floor #","number",n.floor,function(v){n.floor=v;}));fg1.appendChild(floorW);
    var viewW=div({});viewW.appendChild(lbl("View"));viewW.appendChild(mkSelect(S(),viewOpts,n.view,function(v){n.view=v;}));fg1.appendChild(viewW);
    var furnW=div({});furnW.appendChild(lbl("Furnished"));furnW.appendChild(mkSelect(S(),["Unfurnished","Semi-Furnished","Furnished"],n.furnished,function(v){n.furnished=v;}));fg1.appendChild(furnW);
    formCard.appendChild(fg1);

    var fg2=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"});
    var sizeW=div({});sizeW.appendChild(lbl("Size (sqft) *"));sizeW.appendChild(inp(I(),"1,200","number",n.size,function(v){n.size=v;}));fg2.appendChild(sizeW);
    var scW=div({});scW.appendChild(lbl("Service Charge (AED/sqft)"));scW.appendChild(inp(I(),"Auto for known buildings","number",n.serviceCharge,function(v){n.serviceCharge=v;}));fg2.appendChild(scW);
    formCard.appendChild(fg2);

    var fg3=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"});
    var ppW=div({});ppW.appendChild(lbl("Purchase Price (AED) *"));ppW.appendChild(inp(I(),"2,500,000","number",n.purchasePrice,function(v){n.purchasePrice=v;}));fg3.appendChild(ppW);
    var pdW=div({});pdW.appendChild(lbl("Purchase Date *"));
    var dateInp=el("input",{style:Object.assign({},I(),{colorScheme:"dark"}),type:"date"});dateInp.value=n.purchaseDate||"";dateInp.addEventListener("change",function(){n.purchaseDate=dateInp.value;});
    pdW.appendChild(dateInp);fg3.appendChild(pdW);
    formCard.appendChild(fg3);

    var canAdd=n.area&&n.size&&n.purchasePrice&&n.purchaseDate;
    var btnRow=div({display:"flex",gap:"10px"});
    btnRow.appendChild(btn({flex:"1",padding:"13px",borderRadius:"10px",border:"none",background:canAdd?"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")":cl.border,color:canAdd?"#070B14":cl.sub,fontSize:"13px",fontWeight:"800",fontFamily:"'Space Grotesk',monospace",letterSpacing:"0.06em",opacity:canAdd?"1":"0.5"},"ADD TO PORTFOLIO",function(){
      if(!canAdd)return;
      var asset=Object.assign({},n,{id:Date.now().toString(36)});
      ps.assets.push(asset);
      localStorage.setItem("dubaival_portfolio",JSON.stringify(ps.assets));
      ps._new={building:"",area:"",type:"Apartment",beds:"2 BR",floor:"",view:"Not specified",size:"",purchasePrice:"",purchaseDate:"",furnished:"Unfurnished",serviceCharge:"",parking:"1"};
      ps.showAdd=false;ps.aiAnalysis="";render();
    }));
    btnRow.appendChild(btn({padding:"13px 20px",borderRadius:"10px",border:"1px solid "+cl.border,background:"transparent",color:cl.sub,fontSize:"13px",fontFamily:"'Space Grotesk',monospace"},"Cancel",function(){ps.showAdd=false;render();}));
    formCard.appendChild(btnRow);
    wrap.appendChild(formCard);
  }

  // AI Analysis
  if(ps.assets.length>0){
    wrap.appendChild(btn({width:"100%",padding:"13px",borderRadius:"10px",border:"none",background:ps.aiLoading?cl.border:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",color:ps.aiLoading?cl.sub:"#070B14",fontSize:"13px",fontWeight:"800",fontFamily:"'Space Grotesk',monospace",letterSpacing:"0.06em",marginBottom:"10px",opacity:ps.aiLoading?"0.5":"1"},ps.aiLoading?"ANALYZING PORTFOLIO…":"AI PORTFOLIO ANALYSIS ◆",function(){
      if(ps.aiLoading)return;
      ps.aiLoading=true;ps.aiAnalysis="";ps.aiErr="";render();
      var areaDist2={};metrics.forEach(function(a){areaDist2[a.area]=(areaDist2[a.area]||0)+a.m.currentValue;});
      var areaEntries2=Object.entries(areaDist2).sort(function(a,b){return b[1]-a[1];});
      var summary=metrics.map(function(a){return"- "+(a.building||"Unknown")+" in "+a.area+": "+a.beds+", "+parseInt(a.size).toLocaleString()+" sqft, bought AED "+a.m.purchasePrice.toLocaleString()+" ("+a.purchaseDate+"), now AED "+a.m.currentValue.toLocaleString()+" (ROI "+a.m.roi.toFixed(1)+"%), gross yield "+a.m.grossYield.toFixed(1)+"%, net "+a.m.netYield.toFixed(1)+"%, grade: "+a.m.grade+", signal: "+a.m.investSignal+", total return: "+a.m.totalReturn.toFixed(1)+"%";}).join("\n");
      var prompt="My Dubai real estate portfolio (June 2026):\n"+summary+"\n\nTotal value: AED "+totalValue.toLocaleString()+" | Total ROI: "+totalROI.toFixed(1)+"%\nAvg gross yield: "+avgGrossYield.toFixed(1)+"% | Avg net yield: "+avgNetYield.toFixed(1)+"%\nAreas: "+areaEntries2.map(function(e){return e[0]+" ("+(e[1]/totalValue*100).toFixed(0)+"%)"}).join(", ")+"\n\nInvestment goals: Risk: "+ps.goals.risk+" | Horizon: "+ps.goals.horizon+" | Target: "+ps.goals.target+"\nMarket: Post-geo correction, supply pressure H2 2026, buyer leverage window.\n\nFor EACH property give a signal: HOLD / SELL / BUY MORE with 1 sentence why.\nThen give 2-3 portfolio-level strategic recommendations.\nBe specific with AED numbers. Consider area growth forecasts and diversification.";
      askAI([{role:"user",content:prompt}],"You are DubaiVal Portfolio Advisor. June 2026 Dubai expert. Analyze portfolios for UHNW investors. Specific AED numbers, decisive signals. Professional tone.").then(function(text){ps.aiAnalysis=text;ps.aiLoading=false;render();}).catch(function(e){ps.aiErr=e.message;ps.aiLoading=false;render();});
    }));
    if(ps.aiErr)wrap.appendChild(span({color:cl.red,fontSize:"11px",fontFamily:"'Space Grotesk',monospace",display:"block",marginBottom:"10px"},ps.aiErr));
  }
  if(ps.aiLoading){
    var spinWrap=div({background:cl.surface,border:"1px solid "+cl.border,borderRadius:"14px",padding:"24px",textAlign:"center",marginBottom:"14px"});
    spinWrap.appendChild(div({width:"36px",height:"36px",borderRadius:"50%",border:"2px solid "+cl.border,borderTopColor:cl.gold,animation:"spin 0.8s linear infinite",margin:"0 auto 14px"}));
    spinWrap.appendChild(span({color:cl.sub,fontSize:"11px",fontFamily:"'Space Grotesk',monospace"},"AI analyzing your portfolio…"));
    wrap.appendChild(spinWrap);
  }
  if(ps.aiAnalysis&&!ps.aiLoading){
    var aiCard=div({background:cl.surface,border:"1px solid "+cl.goldDim,borderRadius:"14px",padding:"20px",marginBottom:"14px"});
    aiCard.appendChild(span({color:cl.gold,fontSize:"10px",letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace",display:"block",marginBottom:"12px"},"◆ AI Portfolio Intelligence"));
    var aiText=div({color:cl.subHi,fontSize:"13.5px",lineHeight:"1.9",fontFamily:"'Inter',sans-serif",whiteSpace:"pre-wrap"});aiText.textContent=ps.aiAnalysis;aiCard.appendChild(aiText);
    wrap.appendChild(aiCard);
  }

  // Disclaimer
  var disc=div({background:cl.goldFaint,border:"1px solid "+cl.goldDim,borderRadius:"8px",padding:"10px 14px",fontSize:"11px",fontFamily:"'Inter',sans-serif",lineHeight:"1.6",color:cl.subHi});
  disc.innerHTML="<strong style='color:"+cl.gold+"'>Note:</strong> Valuations use DubaiVal's Cascade AVM with hedonic pricing (5,612 buildings · 152 areas). Portfolio data is stored locally on your device. Not financial advice — consult a licensed advisor for investment decisions.";
  wrap.appendChild(disc);

}

// --- CHAT TAB ----------------------------------------------------------------
function renderChat(){
  const cl=C();
  const wrap=div({display:"flex",flexDirection:"column",height:"calc(100vh - 130px)",padding:"0 20px",maxWidth:"640px",margin:"0 auto",width:"100%"});
  const msgsDiv=div({flex:"1",overflowY:"auto",display:"flex",flexDirection:"column",gap:"12px",paddingTop:"16px",paddingBottom:"12px",minHeight:"0"});
  chatState.msgs.forEach(function(m){
    const isA=m.role==="assistant";
    const row=div({display:"flex",justifyContent:isA?"flex-start":"flex-end",gap:"8px"});
    if(isA){row.appendChild(div({width:"28px",height:"28px",borderRadius:"7px",flexShrink:"0",background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:"900",color:"#070B14",fontFamily:"'Space Grotesk',monospace"},"DV"));}
    const bubble=div({maxWidth:"84%",background:isA?cl.surface:cl.goldFaint,border:"1px solid "+(isA?cl.border:cl.goldDim),borderRadius:isA?"14px 14px 14px 0":"14px 14px 0 14px",padding:"11px 15px",color:cl.subHi,fontSize:"13px",lineHeight:"1.8",fontFamily:"'Inter',sans-serif",whiteSpace:"pre-wrap"});
    bubble.textContent=m.text;row.appendChild(bubble);msgsDiv.appendChild(row);
  });
  if(chatState.loading){
    const row=div({display:"flex",gap:"8px",alignItems:"center"});
    row.appendChild(div({width:"28px",height:"28px",borderRadius:"7px",background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:"900",color:"#070B14"},"DV"));
    const dots=div({display:"flex",gap:"4px"});
    [0,1,2].forEach(function(j){dots.appendChild(div({width:"7px",height:"7px",borderRadius:"50%",background:cl.gold,animation:"bounce 1.1s "+(j*0.18)+"s infinite"}))});
    row.appendChild(dots);msgsDiv.appendChild(row);
  }
  wrap.appendChild(msgsDiv);
  if(chatState.msgs.length<=1){
    const suggs=div({display:"flex",flexDirection:"column",gap:"7px",marginBottom:"10px"});
    ["Is BLVD Heights at AED 2,800 PSF a good deal?","Best yield under AED 1.5M right now?","Off-plan vs ready in 2026?","Geo risk still affecting prices?"].forEach(function(s){
      suggs.appendChild(el("button",{style:{background:cl.surface,border:"1px solid "+cl.border,color:cl.sub,padding:"9px 14px",borderRadius:"10px",cursor:"pointer",fontSize:"12.5px",fontFamily:"'Inter',sans-serif",textAlign:"left"},onclick:function(){sendChat(s);}},s));
    });
    wrap.appendChild(suggs);
  }
  const inputRow=div({display:"flex",gap:"10px",alignItems:"center",background:cl.surface,border:"1px solid "+cl.border,borderRadius:"12px",padding:"10px 14px",marginBottom:"14px"});
  const chatInp=el("input",{style:{flex:"1",background:"transparent",border:"none",outline:"none",color:cl.white,fontSize:"13px",fontFamily:"'Inter',sans-serif",caretColor:cl.gold},placeholder:"Ask about any building, deal, or market question…"});
  chatInp.value=chatState.input;
  chatInp.addEventListener("input",function(){chatState.input=chatInp.value;});
  chatInp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});
  inputRow.appendChild(chatInp);
  inputRow.appendChild(el("button",{style:{background:"linear-gradient(135deg,"+cl.gold+","+cl.goldDim+")",color:"#070B14",border:"none",width:"36px",height:"36px",borderRadius:"8px",cursor:"pointer",fontSize:"14px",fontWeight:"800"},onclick:function(){sendChat();}},"→"));
  wrap.appendChild(inputRow);
  setTimeout(function(){msgsDiv.scrollTop=msgsDiv.scrollHeight;},50);
  return wrap;
}

async function sendChat(text){
  const t=text||chatState.input.trim();
  if(!t||chatState.loading)return;
  chatState.input="";chatState.msgs.push({role:"user",text:t});chatState.loading=true;render();
  try{
    const history=chatState.msgs.slice(-8).map(function(m){return{role:m.role==="assistant"?"assistant":"user",content:m.text};});

    const reply=await askAI(history,getChatSys());
    chatState.msgs.push({role:"assistant",text:reply});
  }catch(e){chatState.msgs.push({role:"assistant",text:"Error: "+e.message});}
  chatState.loading=false;render();
}

render();
</script>
