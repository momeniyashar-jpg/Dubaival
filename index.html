*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden!important;overscroll-behavior-x:none!important;-webkit-overflow-scrolling:touch}

/* Keyframes */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Sidebar (desktop) */
.dv-layout{display:flex;min-height:100vh;max-width:100%;overflow-x:hidden;min-width:0;width:100%}
.dv-sidebar{width:240px;min-height:100vh;background:rgba(13,18,32,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid rgba(255,255,255,0.06);padding:16px 0;position:fixed;left:0;top:0;z-index:100;transition:width 0.2s ease;display:flex;flex-direction:column;overflow-y:auto}

.dv-sidebar.collapsed .dv-sidebar-label,.dv-sidebar.collapsed .dv-sidebar-logo-text{display:none}
.dv-sidebar.collapsed .dv-sidebar-item{justify-content:center;padding:12px 0}
.dv-sidebar-logo{display:flex;align-items:center;gap:10px;padding:8px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.dv-sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#8899AA;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s ease;font-family:'Space Grotesk',monospace;font-size:13px;font-weight:500;user-select:none;border-radius:0 8px 8px 0;margin-right:8px}
.dv-sidebar-item:hover{color:#E8EDF5;background:rgba(255,255,255,0.06)}
.dv-sidebar-item.active{color:#D4AF37;background:rgba(212,175,55,0.1);border-left-color:#D4AF37;font-weight:700}
.dv-sidebar-toggle{margin-top:auto;padding:12px 20px;color:#556677;cursor:pointer;font-size:18px;text-align:center;border-top:1px solid rgba(255,255,255,0.06)}
.dv-sidebar-toggle:hover{color:#8899AA}
.dv-main{flex:1;margin-left:240px;transition:margin-left 0.2s ease;min-height:100vh;display:flex;flex-direction:column;max-width:100%;overflow-x:hidden;width:100%;min-width:0}
.dv-sidebar.collapsed~.dv-main,.dv-main.sidebar-collapsed{margin-left:64px}

/* Sub-tab pills — Native app chips */
.dv-subtabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;background:transparent;flex-shrink:0;width:100%;max-width:100%;box-sizing:border-box}
.dv-subtabs::-webkit-scrollbar{display:none}
.dv-pill{background:rgba(255,255,255,0.04);border:none;border-radius:10px;padding:8px 16px;color:#6B7A9E;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);font-weight:600;-webkit-tap-highlight-color:transparent}

.dv-pill.active{background:rgba(212,175,55,0.12);color:#D4AF37;font-weight:700}

/* Bottom tab bar (mobile) — Modern native app style */

/* Tool grid buttons — Native app style */

.dv-tool-btn:hover{background:rgba(255,255,255,0.08);transform:translateY(-1px)}
.dv-tool-btn .dv-tool-icon{font-size:24px}
.dv-tool-btn .dv-tool-label{font-size:12px;color:#E8EDF5;font-weight:600;font-family:'Inter',sans-serif}

/* Table design system — Glassmorphism */
.dv-table{width:100%;border-collapse:collapse}
.dv-table thead{position:sticky;top:0;background:rgba(13,18,32,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.dv-table th{color:#D4AF37;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;padding:12px 14px;text-align:left;font-family:'Space Grotesk',monospace;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08)}

.dv-table tr:nth-child(even){background:rgba(255,255,255,0.04)}
.dv-table td{padding:12px 14px;font-size:13px;color:#E8EDF5;font-family:'Inter',sans-serif;border-bottom:1px solid rgba(255,255,255,0.04)}
.dv-table tr:hover{background:rgba(212,175,55,0.06)}

/* Mobile responsive */
@media(max-width:768px){

  .dv-mobile-logo{display:inline-block!important}

@media(max-width:640px){

html,body,#app{max-width:100%!important;overflow-x:hidden!important;width:100%!important}
