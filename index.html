const AREA_NAMES = Object.keys(AREAS);

function lookupBuilding(name) {
  if(!name||name.length<3) return null;
  const k = name.toLowerCase().trim();
  if(DB[k]) return DB[k];
  const f = Object.entries(DB).find(([key])=>k.includes(key)||key.includes(k));
  return f?f[1]:null;
}

function computeVal(f, building, sales, txs) {
  const bData = lookupBuilding(building);
  const aData = AREAS[f.area]||{psf:1800,sc:15,y:[5,7],g:[10,18,28],r2:100000,r3:150000};
  const askPSF = f.size&&f.price ? Math.round(f.price/f.size) : 0;
  if(!askPSF) return null;

  let basePSF, psfLo, psfHi, src, layer;
  if(bData) {
    basePSF=bData.p; psfLo=bData.lo; psfHi=bData.hi; src="Verified DB"; layer=1;
  } else {
    const pool=(sales||[]).filter(s=>s.psf>400&&s.psf<15000);
    if(pool.length>=3) {
      const psfs=pool.map(s=>s.psf).sort((a,b)=>a-b);
      basePSF=Math.round(psfs.reduce((s,p)=>s+p,0)/psfs.length);
      psfLo=psfs[Math.floor(psfs.length*0.2)]||Math.round(basePSF*0.9);
      psfHi=psfs[Math.floor(psfs.length*0.8)]||Math.round(basePSF*1.1);
      src=pool.length+" live comps"; layer=2;
    } else {
      basePSF=aData.psf; psfLo=Math.round(basePSF*0.88); psfHi=Math.round(basePSF*1.12);
      src="Area benchmark"; layer=4;
    }
  }

  const vP=VIEW_P[f.view]||0;
  const flN=parseInt(f.floor)||20;
  const fP=flN>10?(flN-10)*0.005:0;
  const furnP=f.furnished==="Furnished"?0.15:f.furnished==="Semi-Furnished"?0.07:0;
  const geo=-0.06;
  const mult=(1+vP)*(1+fP)*(1+furnP)*(1+geo);

  basePSF=Math.round(basePSF*mult);
  psfLo=Math.round(psfLo*mult);
  psfHi=Math.round(psfHi*mult);

  const pk=Math.max(0,(parseInt(f.parking)||1)-1)*80000;
  const fair=Math.round(basePSF*f.size+pk);
  const distress=Math.round(psfLo*0.91*f.size);
  const good=Math.round(psfLo*f.size);
  const over=Math.round(psfHi*1.06*f.size);
  const vsPct=((askPSF-basePSF)/basePSF*100).toFixed(1);

  let verdict, offer;
  if(askPSF<=psfLo*0.91){verdict="DISTRESS";offer=null;}
  else if(askPSF<=psfLo){verdict="GOOD";offer=null;}
  else if(askPSF<=psfHi){verdict="FAIR";offer=Math.round(fair*0.97);}
  else{verdict="OVER";offer=fair;}

  const baseConf=[0,95,85,72,58][layer]||58;
  const txB=(txs||[]).length>=5?5:(txs||[]).length>=2?2:0;
  const pen=(!f.floor?-4:0)+(f.view==="Not specified"?-2:0)+(!f.serviceCharge?-1:0);
  const confScore=Math.min(97,Math.max(40,baseConf+txB+pen));
  const confTier=confScore>=90?{label:"Very High",range:"+-3-5%",spread:0.04,col:C.green}:
                  confScore>=80?{label:"High",range:"+-5-8%",spread:0.07,col:C.green}:
                  confScore>=68?{label:"Medium",range:"+-8-12%",spread:0.11,col:C.yellow}:
                                {label:"Low",range:"+-12-18%",spread:0.15,col:C.yellow};

  const bn={"Studio":0,"1 BR":1,"2 BR":2,"3 BR":3,"4 BR":4,"5+ BR":5}[f.beds]??2;
  const rent=bn<=1?aData.r2*0.65:bn===2?aData.r2:bn===3?aData.r3:(aData.r3||150000)*1.4;
  const sc=(parseFloat(f.serviceCharge)||bData?.sc||aData.sc||15)*f.size;
  const gy=(rent/f.price*100).toFixed(1);
  const ny=((rent-sc)/f.price*100).toFixed(1);
  const g=aData.g||[10,18,28];

  return {askPSF,basePSF,psfLo,psfHi,fair,distress,good,over,verdict,vsPct,offer,
    src,layer,confScore,confTier,inDB:!!bData,
    vP:Math.round(vP*100),fP:Math.round(fP*100),furnP:Math.round(furnP*100),
    rent,sc,gy,ny,g0:g[0],g1:g[1],g2:g[2],
    priceLow:Math.round(fair*(1-confTier.spread)),priceHigh:Math.round(fair*(1+confTier.spread)),
    comps:(sales||[]).length,txs:(txs||[]).length};
}

      fetch("https://"+PF_HOST+"/search-buy?page=1&hitsPerPage=10&q="+encodeURIComponent(q)+"&rooms="+bn,{headers:pfH}).then(r=>r.ok?r.json():null),
      fetch("https://"+PF_HOST+"/get-get-transactions?page=1&size=12&q="+encodeURIComponent(q),{headers:pfH}).then(r=>r.ok?r.json():null),
    ]);
    const sales=s.status==="fulfilled"&&s.value?.data?.properties
      ?s.value.data.properties.filter(p=>p.price&&p.area).map(p=>({price:p.price,size:p.area,psf:Math.round(p.price/p.area),beds:p.rooms})):[];
    const txs=t.status==="fulfilled"&&t.value?.data?.transactions
      ?t.value.data.transactions.filter(tx=>tx.price&&tx.area).map(tx=>({date:tx.date||tx.transactionDate,price:tx.price||tx.transactionAmount,size:tx.area,psf:Math.round((tx.price||tx.transactionAmount)/tx.area)})):[];
    return {sales,txs};
  } catch(e){return {sales:[],txs:[]};}
}

async function askClaude(messages,system="") {
  const body={model:"claude-sonnet-4-20250514",max_tokens:900,messages};
  if(system) body.system=system;
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("API "+r.status);
  const d=await r.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

  const [loading,setLoading]=React.useState(false);
  const bottomRef=React.useRef(null);
  React.useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const send=async(text)=>{
    const t=text||input.trim();
    if(!t||loading)return;
    setInput("");
    const newMsgs=[...msgs,{role:"user",text:t}];
    setMsgs(newMsgs);setLoading(true);
    try{
      const history=newMsgs.slice(-8).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const reply=await askClaude(history,"You are DubaiVal AI. Dubai June 2026. PSF: Downtown 2400, Marina 2000, Palm 3300, Business Bay 1900, JVC 1150. Yields: JVC 7.5-9.5%, Business Bay 5.8-6.5%, Downtown 4.8-5.5%. Geo adj -6%. Buyer window open. Specific AED numbers. No fluff.");
      setMsgs(p=>[...p,{role:"assistant",text:reply}]);
    }catch(e){setMsgs(p=>[...p,{role:"assistant",text:"Error: "+e.message}]);}
    setLoading(false);
  };

  const sugg=["Is BLVD Heights at AED 2,800 PSF a good deal?","Best yield under AED 1.5M?","Geo risk still affecting prices?","Off-plan vs ready 2026?"];

  return <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 120px)",padding:"0 20px",maxWidth:640,margin:"0 auto",width:"100%"}}>
    <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:12,paddingTop:14,paddingBottom:12,minHeight:0}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
        {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:7,flexShrink:0,background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#070B14",fontFamily:"'Space Grotesk',monospace"}}>DV</div>}
        <div style={{maxWidth:"84%",background:m.role==="user"?C.goldFaint:C.surface,border:"1px solid "+(m.role==="user"?C.goldDim:C.border),borderRadius:m.role==="user"?"14px 14px 0 14px":"14px 14px 14px 0",padding:"11px 15px",color:C.subHi,fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{m.text}</div>
      </div>)}
      {loading&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#070B14"}}>DV</div>
        <div style={{display:"flex",gap:4}}>{[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:C.gold,animation:"bounce 1.1s "+(j*0.18)+"s infinite"}}/>)}</div>
      </div>}
      <div ref={bottomRef}/>
    </div>
    {msgs.length<=1&&<div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:10}}>
      {sugg.map((s,i)=><button key={i} onClick={()=>send(s)} style={{background:C.surface,border:"1px solid "+C.border,color:C.sub,padding:"9px 14px",borderRadius:10,cursor:"pointer",fontSize:12.5,textAlign:"left"}}>{s}</button>)}
    </div>}
    <div style={{display:"flex",gap:10,alignItems:"center",background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:"10px 14px",marginBottom:14}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask about any building, deal, or area..." style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.white,fontSize:13,caretColor:C.gold}} autoComplete="off"/>
      <button onClick={()=>send()} disabled={loading||!input.trim()} style={{background:loading||!input.trim()?C.border:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",color:"#070B14",border:"none",width:36,height:36,borderRadius:8,cursor:loading||!input.trim()?"not-allowed":"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>{">"}</button>
    </div>
  </div>;
}

function App() {
  const [tab,setTab]=React.useState("Market");
  const tabs=[{id:"Market",icon:"*",label:"Market"},{id:"Analyzer",icon:">>",label:"Analyzer"},{id:"Chat",icon:"AI",label:"AI Chat"}];

  return <div style={{background:C.bg,minHeight:"100vh",color:C.white,fontFamily:"Inter,sans-serif"}}>
    <div style={{background:C.gold,overflow:"hidden",padding:"4px 0"}}>
      <div style={{display:"flex",gap:56,whiteSpace:"nowrap",animation:"ticker 32s linear infinite",fontFamily:"'Space Grotesk',monospace",fontSize:10.5,color:"#070B14",fontWeight:700}}>
        {["Q1 2026: AED 252B +31%","Villa PSF +16%","Foreign Capital AED 148B","JVC Yield 9.5%","87% Cash","Off-Plan 77.8%","Buyer Window Open","May: AED 14B+/week","Q1 2026: AED 252B +31%","Villa PSF +16%","Foreign Capital AED 148B"].map((t,i)=><span key={i}>* {t}  </span>)}
      </div>
    </div>
    <header style={{background:C.surface,borderBottom:"1px solid "+C.border,padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:54,position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:7,background:"linear-gradient(135deg,"+C.gold+","+C.goldDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:"#070B14",fontFamily:"'Space Grotesk',monospace"}}>DV</div>
        <div>
          <div style={{color:C.white,fontSize:14,fontWeight:800,fontFamily:"'Space Grotesk',monospace"}}>DubaiVal</div>
          <div style={{color:C.goldDim,fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",fontFamily:"'Space Grotesk',monospace"}}>Property Intelligence</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,background:C.greenBg,border:"1px solid "+C.greenBo,borderRadius:20,padding:"4px 10px"}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:C.green,animation:"pulse 2s infinite"}}/>
        <span style={{color:C.green,fontSize:9.5,fontFamily:"'Space Grotesk',monospace"}}>LIVE</span>
      </div>
    </header>
    <nav style={{background:C.surface,borderBottom:"1px solid "+C.border,display:"flex",padding:"0 20px"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:"transparent",border:"none",borderBottom:"2px solid "+(tab===t.id?C.gold:"transparent"),color:tab===t.id?C.gold:C.sub,padding:"11px 14px",cursor:"pointer",fontFamily:"'Space Grotesk',monospace",fontSize:12.5,fontWeight:tab===t.id?700:400,whiteSpace:"nowrap"}}>
        {t.label}
      </button>)}
    </nav>
    <div key={tab} style={{animation:"fadeUp 0.25s ease"}}>
      {tab==="Market"&&<MarketTab/>}
      {tab==="Analyzer"&&<AnalyzerTab/>}
      {tab==="Chat"&&<ChatTab/>}
    </div>
    <div style={{borderTop:"1px solid "+C.border,padding:"10px 20px",display:"flex",justifyContent:"space-between",marginTop:20}}>
      <span style={{color:C.sub,fontSize:9.5,fontFamily:"'Space Grotesk',monospace"}}>DubaiVal - Cascade AVM - June 2026</span>
      <span style={{color:C.sub,fontSize:9.5,fontFamily:"'Space Grotesk',monospace"}}>Not financial advice</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
