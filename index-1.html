async function pfSale(q, beds) {
  const p = new URLSearchParams({ page: 1, hitsPerPage: 8 });
  if (q) p.set("q", q);
  if (beds) p.set("rooms", beds);
  const r = await fetch(`${PF_BASE}/search-buy?${p}`, { headers: pfH });
  return r.ok ? r.json() : null;
}
async function pfRent(q, beds) {
  const p = new URLSearchParams({ page: 1, hitsPerPage: 8 });
  if (q) p.set("q", q);
  if (beds) p.set("rooms", beds);
  const r = await fetch(`${PF_BASE}/search-rent?${p}`, { headers: pfH });
  return r.ok ? r.json() : null;
}
async function pfTx(q) {
  const p = new URLSearchParams({ page: 1, size: 10 });
  if (q) p.set("q", q);
  const r = await fetch(`${PF_BASE}/get-get-transactions?${p}`, { headers: pfH });
  return r.ok ? r.json() : null;
}

async function fetchMarketData(building, area, beds) {
  const bedsMap = { Studio:"0","1 BR":"1","2 BR":"2","3 BR":"3","4 BR":"4","5+ BR":"5" };
  const q = building ? `${building} ${area}` : area;
  const bn = bedsMap[beds] || "2";
  const [s, re, t] = await Promise.allSettled([pfSale(q, bn), pfRent(q, bn), pfTx(q)]);
  const sales = s.status === "fulfilled" && s.value?.data?.properties
    ? s.value.data.properties.slice(0,6).map(p => ({
        title: p.title || p.name || "",
        price: p.price,
        size: p.area,
        psf: p.area ? Math.round(p.price / p.area) : null,
        beds: p.rooms,
        furnished: p.furnishing,
        location: p.location?.name,
      })) : [];
  const rents = re.status === "fulfilled" && re.value?.data?.properties
    ? re.value.data.properties.slice(0,6).map(p => ({
        price: p.price,
        size: p.area,
        beds: p.rooms,
      })) : [];
  const txs = t.status === "fulfilled" && t.value?.data?.transactions
    ? t.value.data.transactions.slice(0,8).map(tx => ({
        date: tx.date || tx.transactionDate,
        price: tx.price || tx.transactionAmount,
        size: tx.area || tx.propertySize,
        psf: (tx.area||tx.propertySize) ? Math.round((tx.price||tx.transactionAmount)/(tx.area||tx.propertySize)) : null,
        project: tx.projectName || tx.project,
      })) : [];
  return { sales, rents, txs };
}

// ─── CLAUDE AI ────────────────────────────────────────────────────────────────
async function askClaude(messages, system = "") {
  const body = { model: "claude-sonnet-4-20250514", max_tokens: 1200, messages };
  if (system) body.system = system;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(`API ${r.status}`);
  const d = await r.json();
  return d.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
}

      const raw = await askClaude([{ role:"user", content:prompt }], ANALYZER_SYS);
      const clean = raw.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setResult(parsed);
      setStep(3);
    } catch(e) {
      setError("Analysis failed: " + e.message);
      setStep(0);
    }
  };

  const sel = {
    width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text,
    padding:"11px 14px", borderRadius:10, fontSize:13, fontFamily:"'DM Sans',sans-serif",
    outline:"none", WebkitAppearance:"none", cursor:"pointer",
  };

  const inputStyle = {
    ...sel, WebkitTextFillColor:C.text, caretColor:C.gold,
    WebkitUserSelect:"text", userSelect:"text",
  };

  return (
    <div style={{ padding:"20px", maxWidth:600, margin:"0 auto" }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ color:C.gold, fontSize:10, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:4 }}>◆ Property Deal Analyzer</div>
        <div style={{ color:C.textSub, fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>Live data from PropertyFinder & DLD · AI-powered verdict</div>
      </div>

      {/* FORM */}
      <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px", marginBottom:16 }}>

        {/* Building Name — controlled with ref to avoid re-render issues */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Building Name</label>
          <input
            ref={buildingRef}
            type="text"
            defaultValue=""
            placeholder="e.g. Burj Vista, Marina Gate, Samana Hills…"
            onChange={e => setBuildingVal(e.target.value)}
            style={inputStyle}
            autoComplete="off"
            autoCorrect="off"
            spellCheck="false"
          />
        </div>

        {/* Area + Type */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Area *</label>
            <select style={sel} value={f.area} onChange={e => update("area", e.target.value)}>
              <option value="">Select…</option>
              {AREAS.map(a => <option key={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Type</label>
            <select style={sel} value={f.type} onChange={e => update("type", e.target.value)}>
              {["Apartment","Villa","Townhouse","Penthouse","Studio"].map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
        </div>

        {/* Beds + Floor */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Bedrooms</label>
            <select style={sel} value={f.beds} onChange={e => update("beds", e.target.value)}>
              {["Studio","1 BR","2 BR","3 BR","4 BR","5+ BR"].map(b => <option key={b}>{b}</option>)}
            </select>
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Floor</label>
            <input type="number" placeholder="e.g. 24" style={inputStyle} value={f.floor} onChange={e => update("floor", e.target.value)} />
          </div>
        </div>

        {/* View */}
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>View</label>
          <select style={sel} value={f.view} onChange={e => update("view", e.target.value)}>
            {["Not specified","Full Sea View","Partial Sea View","Burj Khalifa View","Partial Burj View","Full Canal View","Partial Canal View","Pool View","Garden/Park View","City Skyline","Road View"].map(v => <option key={v}>{v}</option>)}
          </select>
        </div>

        {/* Size + Price */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Size (sqft) *</label>
            <input type="number" placeholder="1200" style={inputStyle} value={f.size} onChange={e => update("size", e.target.value)} />
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Asking Price (AED) *</label>
            <input type="number" placeholder="2500000" style={inputStyle} value={f.price} onChange={e => update("price", e.target.value)} />
          </div>
        </div>

        {/* Furnished + Parking */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Furnished</label>
            <select style={sel} value={f.furnished} onChange={e => update("furnished", e.target.value)}>
              {["Unfurnished","Furnished","Semi-Furnished"].map(v => <option key={v}>{v}</option>)}
            </select>
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Parking</label>
            <select style={sel} value={f.parking} onChange={e => update("parking", e.target.value)}>
              {["0","1","2","3+"].map(v => <option key={v}>{v}</option>)}
            </select>
          </div>
        </div>

        {/* Service Charge + Purpose */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Service Charge (AED/sqft)</label>
            <input type="number" placeholder="18" style={inputStyle} value={f.serviceCharge} onChange={e => update("serviceCharge", e.target.value)} />
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Purpose</label>
            <select style={sel} value={f.purpose} onChange={e => update("purpose", e.target.value)}>
              {["Investment","End-Use","Rental Income","Capital Appreciation","Flip / Resale"].map(v => <option key={v}>{v}</option>)}
            </select>
          </div>
        </div>

        {/* PSF Preview */}
        {psf && (
          <div style={{ background:C.goldFaint, border:`1px solid ${C.goldDim}`, borderRadius:10, padding:"10px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <span style={{ color:C.grayL, fontSize:12, fontFamily:"'DM Mono',monospace" }}>Calculated PSF</span>
            <span style={{ color:C.gold, fontSize:18, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>AED {psf.toLocaleString()}</span>
          </div>
        )}

        {/* Button */}
        <button
          onClick={analyze}
          disabled={step>0&&step<3 || !f.area || !f.size || !f.price}
          style={{
            width:"100%", padding:"14px", borderRadius:10, border:"none",
            background: (step>0&&step<3)||!f.area||!f.size||!f.price
              ? C.border
              : `linear-gradient(135deg, ${C.gold}, ${C.goldDim})`,
            color: (step>0&&step<3)||!f.area||!f.size||!f.price ? C.grayL : "#080A10",
            fontSize:14, fontWeight:800, fontFamily:"'DM Sans',sans-serif",
            cursor:(step>0&&step<3)||!f.area||!f.size||!f.price?"not-allowed":"pointer",
            letterSpacing:"0.03em",
          }}
        >
          {step===1 ? "⟳ Fetching Live Data…" : step===2 ? "⟳ AI Analyzing…" : "▶ Analyze This Deal"}
        </button>
        {error && <div style={{ color:C.red, fontSize:11, marginTop:8, fontFamily:"'DM Mono',monospace" }}>{error}</div>}
      </div>

      {/* LOADING */}
      {(step===1||step===2) && (
        <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px" }}>
          <Spinner C={C} label={step===1?"Fetching live market data…":"AI analyzing your deal…"} />
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginTop:8 }}>
            {[
              { s:1, label:"Pulling PropertyFinder live listings" },
              { s:1, label:"Fetching DLD transaction history" },
              { s:2, label:"Calculating market PSF" },
              { s:2, label:"Computing yield & ROI projections" },
            ].map((item,i) => (
              <div key={i} style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:step>=item.s?C.green:C.border, transition:"background 0.3s" }}/>
                <span style={{ color:step>=item.s?C.grayLL:C.grayL, fontSize:12, fontFamily:"'DM Mono',monospace" }}>{item.label}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* RESULTS */}
      {step===3 && result && (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>

          {/* VERDICT — Most Important */}
          <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, overflow:"hidden" }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${C.border}` }}>
              <div style={{ color:C.gold, fontSize:10, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>◆ Price Verdict</div>
            </div>
            <div style={{ padding:"20px" }}>
              <VerdictBadge verdict={result.verdict} C={C} />
              <div style={{ marginTop:16, color:C.text, fontSize:14, lineHeight:1.7, fontFamily:"'DM Sans',sans-serif" }}>
                {result.summary}
              </div>
              {result.suggested_offer && (
                <div style={{ marginTop:12, background:C.goldFaint, border:`1px solid ${C.goldDim}`, borderRadius:10, padding:"12px 16px" }}>
                  <div style={{ color:C.grayL, fontSize:10, textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:4 }}>Suggested Offer</div>
                  <div style={{ color:C.gold, fontSize:20, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>AED {result.suggested_offer?.toLocaleString()}</div>
                </div>
              )}
            </div>
          </div>

          {/* Price Comparison */}
          <Section title="Price Analysis" icon="📊" C={C}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:16 }}>
              <StatCard label="Asking PSF" value={`AED ${result.asking_psf?.toLocaleString()}`} C={C} />
              <StatCard label="Market PSF Low" value={`AED ${result.market_psf_low?.toLocaleString()}`} C={C} color={C.green} />
              <StatCard label="Market PSF High" value={`AED ${result.market_psf_high?.toLocaleString()}`} C={C} color={C.green} />
            </div>
            <div style={{ background:result.vs_market_pct<-5?C.greenBg:result.vs_market_pct>5?C.redBg:C.yellowBg, border:`1px solid ${result.vs_market_pct<-5?C.greenBorder:result.vs_market_pct>5?C.redBorder:C.yellowBorder}`, borderRadius:10, padding:"12px 16px", marginBottom:12 }}>
              <div style={{ color:C.grayL, fontSize:10, textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:4 }}>vs Market Average</div>
              <div style={{ color:result.vs_market_pct<0?C.green:C.red, fontSize:22, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>
                {result.vs_market_pct>0?"+":""}{result.vs_market_pct?.toFixed(1)}%
              </div>
            </div>
            <div style={{ color:C.textSub, fontSize:13, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif" }}>{result.benchmark_note}</div>
          </Section>

          {/* Yield & ROI */}
          <Section title="Rental Yield & ROI" icon="💰" C={C}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              <StatCard label="Expected Annual Rent" value={`AED ${result.expected_rent_annual?.toLocaleString()}`} C={C} color={C.green} />
              <StatCard label="Gross Yield" value={`${result.gross_yield_pct?.toFixed(1)}%`} C={C} color={C.green} />
              <StatCard label="Net Yield" value={`${result.net_yield_pct?.toFixed(1)}%`} C={C} />
              <StatCard label="Risk Level" value={result.risk_level} C={C} color={result.risk_level==="LOW"?C.green:result.risk_level==="HIGH"?C.red:C.yellow} />
            </div>
            <div style={{ color:C.textSub, fontSize:13, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif" }}>{result.yield_note}</div>
          </Section>

          {/* 3-Year ROI */}
          <Section title="3-Year Capital Growth Projection" icon="📈" C={C}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
              <div style={{ background:C.bgHover, borderRadius:10, padding:"14px", textAlign:"center" }}>
                <div style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace", marginBottom:6 }}>Conservative</div>
                <div style={{ color:C.yellow, fontSize:18, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>+{result.roi_3yr_conservative}%</div>
              </div>
              <div style={{ background:C.greenBg, border:`1px solid ${C.greenBorder}`, borderRadius:10, padding:"14px", textAlign:"center" }}>
                <div style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace", marginBottom:6 }}>Base Case</div>
                <div style={{ color:C.green, fontSize:18, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>+{result.roi_3yr_base}%</div>
              </div>
              <div style={{ background:C.bgHover, borderRadius:10, padding:"14px", textAlign:"center" }}>
                <div style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace", marginBottom:6 }}>Optimistic</div>
                <div style={{ color:C.gold, fontSize:18, fontWeight:700, fontFamily:"'DM Mono',monospace" }}>+{result.roi_3yr_optimistic}%</div>
              </div>
            </div>
          </Section>

          {/* Flags */}
          <Section title="Key Factors" icon="🎯" C={C}>
            {result.positive_flags?.length > 0 && (
              <div style={{ marginBottom:12 }}>
                <div style={{ color:C.green, fontSize:11, fontFamily:"'DM Mono',monospace", marginBottom:8 }}>✅ POSITIVES</div>
                {result.positive_flags.map((f,i) => (
                  <div key={i} style={{ display:"flex", gap:10, marginBottom:6 }}>
                    <span style={{ color:C.green }}>+</span>
                    <span style={{ color:C.textSub, fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>{f}</span>
                  </div>
                ))}
              </div>
            )}
            {result.risk_flags?.length > 0 && (
              <div style={{ marginBottom:12 }}>
                <div style={{ color:C.red, fontSize:11, fontFamily:"'DM Mono',monospace", marginBottom:8 }}>⚠️ RISK FLAGS</div>
                {result.risk_flags.map((f,i) => (
                  <div key={i} style={{ display:"flex", gap:10, marginBottom:6 }}>
                    <span style={{ color:C.red }}>!</span>
                    <span style={{ color:C.textSub, fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>{f}</span>
                  </div>
                ))}
              </div>
            )}
            {result.negotiation_tip && (
              <div style={{ background:C.goldFaint, border:`1px solid ${C.goldDim}`, borderRadius:10, padding:"12px 16px" }}>
                <div style={{ color:C.gold, fontSize:11, fontFamily:"'DM Mono',monospace", marginBottom:4 }}>💬 NEGOTIATION TIP</div>
                <div style={{ color:C.text, fontSize:13, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif" }}>{result.negotiation_tip}</div>
              </div>
            )}
          </Section>

          {/* Live Comps */}
          {mktData && (mktData.sales.length > 0 || mktData.rents.length > 0) && (
            <Section title="Live Market Comps" icon="🔍" C={C}>
              {mktData.sales.length > 0 && (
                <div style={{ marginBottom:16 }}>
                  <div style={{ color:C.grayL, fontSize:10, textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:8 }}>Sale Listings ({mktData.sales.length})</div>
                  {mktData.sales.slice(0,4).map((s,i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:i<3?`1px solid ${C.border}`:"none" }}>
                      <span style={{ color:C.textSub, fontSize:12, fontFamily:"'DM Sans',sans-serif", flex:1 }}>{s.beds}BR · {s.size}sqft</span>
                      <span style={{ color:C.text, fontSize:12, fontFamily:"'DM Mono',monospace" }}>AED {s.price?.toLocaleString()}</span>
                      <span style={{ color:C.grayL, fontSize:11, fontFamily:"'DM Mono',monospace", marginLeft:12 }}>PSF {s.psf?.toLocaleString()}</span>
                    </div>
                  ))}
                </div>
              )}
              {mktData.rents.length > 0 && (
                <div>
                  <div style={{ color:C.grayL, fontSize:10, textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:8 }}>Rental Listings ({mktData.rents.length})</div>
                  {mktData.rents.slice(0,4).map((r,i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:i<3?`1px solid ${C.border}`:"none" }}>
                      <span style={{ color:C.textSub, fontSize:12, fontFamily:"'DM Sans',sans-serif" }}>{r.beds}BR · {r.size}sqft</span>
                      <span style={{ color:C.green, fontSize:12, fontFamily:"'DM Mono',monospace" }}>AED {r.price?.toLocaleString()}/yr</span>
                    </div>
                  ))}
                </div>
              )}
            </Section>
          )}

          {/* Analyze Another CTA */}
          <button onClick={() => { setStep(0); setResult(null); window.scrollTo({top:0,behavior:"smooth"}); }}
            style={{ width:"100%", padding:"14px", borderRadius:10, border:`1px solid ${C.border}`, background:"transparent", color:C.grayL, fontSize:13, fontFamily:"'DM Sans',sans-serif", cursor:"pointer" }}>
            ← Analyze Another Property
          </button>
        </div>
      )}
    </div>
  );
}

// ─── ADVISOR TAB ──────────────────────────────────────────────────────────────
function AdvisorTab({ C }) {
  const [msgs, setMsgs] = useState([{
    role:"assistant",
    text:"Welcome to DubaiVal AI.\n\nI have real-time knowledge of Dubai's June 2026 market — PSF benchmarks, building-level data, rental yields, and deal verdicts.\n\nAsk me about any building, area, or investment strategy.",
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs]);

  const send = async (text) => {
    const t = text || input.trim();
    if (!t || loading) return;
    setInput("");
    const newMsgs = [...msgs, { role:"user", text:t }];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const history = newMsgs.slice(-8).map(m => ({ role:m.role==="assistant"?"assistant":"user", content:m.text }));
      const reply = await askClaude(history, ADVISOR_SYS);
      setMsgs(prev => [...prev, { role:"assistant", text:reply }]);
    } catch(e) {
      setMsgs(prev => [...prev, { role:"assistant", text:"Error: " + e.message }]);
    }
    setLoading(false);
  };

  const suggestions = [
    "Is Burj Vista at AED 2,800 PSF a good buy?",
    "Best yield under AED 1.5M right now?",
    "JVC vs Business Bay for rental income?",
    "Off-plan risk in H2 2026?",
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 140px)", padding:"0 20px", maxWidth:600, margin:"0 auto", width:"100%" }}>
      <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:12, paddingTop:20, paddingBottom:16 }}>
        {msgs.map((m,i) => (
          <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start", gap:10 }}>
            {m.role==="assistant" && (
              <div style={{ width:32, height:32, borderRadius:8, flexShrink:0, background:`linear-gradient(135deg,${C.gold},${C.goldDim})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:"#080A10", fontFamily:"'DM Mono',monospace" }}>DV</div>
            )}
            <div style={{
              maxWidth:"82%", background:m.role==="user"?C.goldFaint:C.bgCard,
              border:`1px solid ${m.role==="user"?C.goldDim:C.border}`,
              borderRadius:m.role==="user"?"14px 14px 0 14px":"14px 14px 14px 0",
              padding:"12px 16px", color:C.textSub, fontSize:13, lineHeight:1.8,
              fontFamily:"'DM Sans',sans-serif", whiteSpace:"pre-wrap",
            }}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display:"flex", gap:10, alignItems:"center" }}>
            <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg,${C.gold},${C.goldDim})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:"#080A10" }}>DV</div>
            <div style={{ display:"flex", gap:5 }}>
              {[0,1,2].map(j => <div key={j} style={{ width:7, height:7, borderRadius:"50%", background:C.gold, animation:`bounce 1.1s ${j*0.18}s infinite` }}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {msgs.length <= 1 && (
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:12 }}>
          {suggestions.map((s,i) => (
            <button key={i} onClick={() => send(s)} style={{
              background:C.bgCard, border:`1px solid ${C.border}`, color:C.textSub,
              padding:"10px 16px", borderRadius:10, cursor:"pointer", fontSize:12,
              fontFamily:"'DM Sans',sans-serif", textAlign:"left",
              transition:"border-color 0.2s",
            }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.goldDim;e.currentTarget.style.color=C.gold;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.textSub;}}
            >{s}</button>
          ))}
        </div>
      )}

      <div style={{ display:"flex", gap:10, alignItems:"center", background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:12, padding:"10px 14px", marginBottom:16 }}>
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }}
          placeholder="Ask about any building, area, or deal…"
          style={{ flex:1, background:"transparent", border:"none", outline:"none", color:C.text, fontSize:13, fontFamily:"'DM Sans',sans-serif", WebkitTextFillColor:C.text, caretColor:C.gold }}
          autoComplete="off"
        />
        <button onClick={() => send()} disabled={loading||!input.trim()} style={{
          background:loading||!input.trim()?C.border:`linear-gradient(135deg,${C.gold},${C.goldDim})`,
          color:"#080A10", border:"none", width:36, height:36, borderRadius:8,
          cursor:loading||!input.trim()?"not-allowed":"pointer", fontSize:14,
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>▶</button>
      </div>
    </div>
  );
}

// ─── COMPARE TAB ──────────────────────────────────────────────────────────────
function CompareTab({ C }) {
  const [a1,setA1]=useState(""); const [a2,setA2]=useState("");
  const [b1,setB1]=useState(""); const [b2,setB2]=useState("");
  const [budget,setBudget]=useState(""); const [purpose,setPurpose]=useState("Investment");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(""); const [error,setError]=useState("");

  const sel = { width:"100%", background:C.bg, border:`1px solid ${C.border}`, color:C.text, padding:"11px 14px", borderRadius:10, fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:"none" };
  const inp = { ...sel, WebkitTextFillColor:C.text, caretColor:C.gold };

  const run = async () => {
    if (!a1||!a2) return;
    setLoading(true); setResult(""); setError("");
    try {
      const text = await askClaude([{ role:"user", content:
`Compare for a client:
Location A: ${b1||a1} (${a1})
Location B: ${b2||a2} (${a2})
Budget: ${budget?"AED "+parseInt(budget).toLocaleString():"not specified"} | Purpose: ${purpose}

📊 PRICE: PSF comparison, entry points, 2026 trajectory
🏆 YIELD: Gross rental yield — which wins and why
📈 GROWTH: 3-year capital appreciation with specific building data
👥 DEMAND: Buyer profile, liquidity, days on market
⚠️ RISK: Supply pipeline, specific risks
🏅 VERDICT: For ${purpose} — decisive winner with exact reasoning.`
      }], ADVISOR_SYS);
      setResult(text);
    } catch(e) { setError("Error: "+e.message); }
    setLoading(false);
  };

  return (
    <div style={{ padding:"20px", maxWidth:600, margin:"0 auto" }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ color:C.gold, fontSize:10, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:4 }}>◆ Area Comparison</div>
        <div style={{ color:C.textSub, fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>Side-by-side AI analysis of any two Dubai areas</div>
      </div>

      <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px", marginBottom:16 }}>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Area A</label>
          <select style={sel} value={a1} onChange={e=>setA1(e.target.value)}>
            <option value="">Select…</option>{AREAS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Building A (optional)</label>
          <input style={inp} placeholder="e.g. Marina Gate" value={b1} onChange={e=>setB1(e.target.value)} />
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Area B</label>
          <select style={sel} value={a2} onChange={e=>setA2(e.target.value)}>
            <option value="">Select…</option>{AREAS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Building B (optional)</label>
          <input style={inp} placeholder="e.g. Samana Hills" value={b2} onChange={e=>setB2(e.target.value)} />
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Budget (AED)</label>
            <input style={inp} type="number" placeholder="3000000" value={budget} onChange={e=>setBudget(e.target.value)} />
          </div>
          <div>
            <label style={{ display:"block", color:C.grayL, fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6, fontFamily:"'DM Mono',monospace" }}>Purpose</label>
            <select style={sel} value={purpose} onChange={e=>setPurpose(e.target.value)}>
              {["Investment","End-Use","Rental Income","Capital Appreciation","Off-Plan Flip"].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
        </div>
        <button onClick={run} disabled={loading||!a1||!a2} style={{
          width:"100%", padding:"14px", borderRadius:10, border:"none",
          background:loading||!a1||!a2?C.border:`linear-gradient(135deg,${C.gold},${C.goldDim})`,
          color:loading||!a1||!a2?C.grayL:"#080A10",
          fontSize:14, fontWeight:800, fontFamily:"'DM Sans',sans-serif",
          cursor:loading||!a1||!a2?"not-allowed":"pointer",
        }}>
          {loading ? "⟳ Comparing…" : "▶ Compare Areas"}
        </button>
        {error && <div style={{ color:C.red, fontSize:11, marginTop:8, fontFamily:"'DM Mono',monospace" }}>{error}</div>}
      </div>

      {loading && <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px" }}><Spinner C={C} label="Analyzing both areas…"/></div>}
      {result && !loading && (
        <div style={{ background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:16, padding:"20px" }}>
          <div style={{ color:C.gold, fontSize:10, letterSpacing:"0.15em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace", marginBottom:16 }}>◆ {b1||a1} vs {b2||a2}</div>
          <div style={{ color:C.textSub, fontSize:13, lineHeight:1.8, fontFamily:"'DM Sans',sans-serif", whiteSpace:"pre-wrap" }}>{result}</div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const { C, dark, toggle } = useTheme();
  const [tab, setTab] = useState("Market");
  const TABS = [
    { id:"Market", label:"Market", icon:"📊" },
    { id:"Analyzer", label:"Analyzer", icon:"🔍" },
    { id:"Compare", label:"Compare", icon:"⚖️" },
    { id:"Advisor", label:"AI Advisor", icon:"🤖" },
  ];
  const [analyzeCount] = useState(Math.floor(Math.random()*50)+847);

  return (
    <div style={{ background:C.bg, minHeight:"100vh", color:C.text, fontFamily:"'DM Sans',sans-serif", transition:"background 0.3s, color 0.3s" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:${C.goldDim};border-radius:2px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        @keyframes shimmer{0%{background-position:0% 0}100%{background-position:200% 0}}
        @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        select option{background:${C.bg};}
        input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
      `}</style>

      {/* TICKER */}
      <div style={{ background:C.gold, overflow:"hidden", padding:"5px 0" }}>
        <div style={{ display:"flex", gap:64, whiteSpace:"nowrap", animation:"ticker 30s linear infinite", fontFamily:"'DM Mono',monospace", fontSize:10.5, color:"#050608", fontWeight:700 }}>
          {["Q1 2026: AED 252B · +31% YoY","Villa PSF +16%","Foreign Capital AED 148B","JVC Yield 9.5%","May: AED 14B+/week","87% Cash Purchases","Off-Plan 77.8%",
            "Q1 2026: AED 252B · +31% YoY","Villa PSF +16%","Foreign Capital AED 148B","JVC Yield 9.5%"].map((t,i)=>(
            <span key={i}>◆ {t}</span>
          ))}
        </div>
      </div>

      {/* HEADER */}
      <header style={{ background:C.bgCard, borderBottom:`1px solid ${C.border}`, padding:"0 20px", display:"flex", alignItems:"center", justifyContent:"space-between", height:56, position:"sticky", top:0, zIndex:100, backdropFilter:"blur(10px)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:32, height:32, borderRadius:8, background:`linear-gradient(135deg,${C.gold},${C.goldDim})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:900, color:"#050608", fontFamily:"'DM Mono',monospace" }}>DV</div>
          <div>
            <div style={{ color:C.text, fontSize:15, fontWeight:800, fontFamily:"'Playfair Display',serif", lineHeight:1.1 }}>DubaiVal</div>
            <div style={{ color:C.goldDim, fontSize:9, letterSpacing:"0.1em", textTransform:"uppercase", fontFamily:"'DM Mono',monospace" }}>Property Intelligence</div>
          </div>
        </div>

        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {/* Social proof */}
          <div style={{ display:"flex", alignItems:"center", gap:5, background:C.bg, border:`1px solid ${C.border}`, borderRadius:20, padding:"4px 10px" }}>
            <div style={{ width:6, height:6, borderRadius:"50%", background:C.green, animation:"pulse 2s infinite" }}/>
            <span style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace" }}>{analyzeCount} analyses today</span>
          </div>
          {/* Dark/Light toggle */}
          <button onClick={toggle} style={{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:20, padding:"6px 12px", cursor:"pointer", color:C.grayL, fontSize:12 }}>
            {dark ? "☀️" : "🌙"}
          </button>
        </div>
      </header>

      {/* NAV */}
      <nav style={{ background:C.bgCard, borderBottom:`1px solid ${C.border}`, padding:"0 20px", display:"flex", gap:4, overflowX:"auto" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background:"transparent", border:"none", borderBottom:`2px solid ${tab===t.id?C.gold:"transparent"}`,
            color:tab===t.id?C.gold:C.grayL, padding:"12px 16px", cursor:"pointer",
            fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:tab===t.id?700:400,
            whiteSpace:"nowrap", transition:"all 0.15s",
          }}>
            <span style={{ marginRight:6 }}>{t.icon}</span>{t.label}
          </button>
        ))}
      </nav>

      {/* CONTENT */}
      <div style={{ animation:"fadeIn 0.3s ease" }}>
        {tab==="Market"   && <MarketTab C={C} />}
        {tab==="Analyzer" && <AnalyzerTab C={C} />}
        {tab==="Compare"  && <CompareTab C={C} />}
        {tab==="Advisor"  && <AdvisorTab C={C} />}
      </div>

      {/* FOOTER */}
      <div style={{ borderTop:`1px solid ${C.border}`, padding:"12px 20px", display:"flex", flexDirection:"column", gap:4, marginTop:20 }}>
        <div style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace" }}>DubaiVal · Powered by PropertyFinder API · DLD Data · Claude AI</div>
        <div style={{ color:C.grayL, fontSize:10, fontFamily:"'DM Mono',monospace" }}>Professional use only · Not financial advice · dubaival.com</div>
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.getElementById('loading').style.display='none';
</script>
</body>
</html>
